<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>心願FM | 智慧錦囊</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: "Microsoft JhengHei", sans-serif; }
        #bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; transition: opacity 1.5s ease; z-index: 1; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 2; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; box-sizing: border-box; }
        #quote { color: white; font-size: 1.8rem; line-height: 1.6; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); opacity: 0; transition: opacity 2s ease; font-weight: bold; }
        #btn { position: fixed; bottom: 10%; left: 50%; transform: translateX(-50%); z-index: 3; padding: 15px 30px; background: rgba(255,255,255,0.2); border: 1px solid white; color: white; border-radius: 30px; cursor: pointer; backdrop-filter: blur(5px); }
    </style>
</head>
<body onclick="startExperience()">
    <div id="bg"></div>
    <div id="overlay"><div id="quote">正在靜修，請稍候...</div></div>
    <button id="btn">開啟智慧錦囊</button>

    <script>
        // ⚠️ 請把這裡換成你的 Google Sheet ID
        const SHEET_ID = '你的_SHEET_ID_HERE';
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;

        let currentQuote = "";
        let currentAudio = "";

        // 1. 從 Google Sheet 抓取數據
        fetch(SHEET_URL)
            .then(res => res.text())
            .then(csv => {
                const rows = csv.split('\n').map(row => row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
                // 假設：A列語錄, B列背景圖, D列音檔 (index 3)
                const randomIndex = Math.floor(Math.random() * (rows.length - 1)) + 1;
                const data = rows[randomIndex];
                
                currentQuote = data[0].replace(/"/g, "");
                const bgUrl = data[1] ? data[1].replace(/"/g, "") : "";
                currentAudio = data[3] ? data[3].replace(/"/g, "").trim() : ""; // Column D 是 index 3

                document.getElementById('bg').style.backgroundImage = `url('${bgUrl}')`;
                document.getElementById('quote').innerText = currentQuote;
                document.getElementById('quote').style.opacity = 1;
            });

        function startExperience() {
            // A. 觸發全屏
            const doc = window.document;
            const docEl = doc.documentElement;
            const requestFullScreen = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
            if (requestFullScreen) requestFullScreen.call(docEl);

            // B. 隱藏按鈕
            document.getElementById('btn').style.display = 'none';

            // C. 播放音聲
            if (currentAudio && currentAudio !== "") {
                // 如果有真人錄音
                const audio = new Audio(currentAudio);
                audio.play().catch(e => console.log("播放失敗:", e));
            } else {
                // 否則使用 AI 朗讀
                const msg = new SpeechSynthesisUtterance(currentQuote);
                msg.lang = 'zh-CN';
                window.speechSynthesis.speak(msg);
            }
        }
    </script>
</body>
</html>
