<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>心願 FM 查詢</title>
</head>
<body style="background:#fdf2e9; text-align:center; padding-top:50px; font-family:sans-serif;">
    <h2 style="color:#f39c12;">🎙️ 心願 FM 會員查詢 (測試版)</h2>
    <div style="background:white; display:inline-block; padding:30px; border-radius:15px; shadow: 0 4px 10px rgba(0,0,0,0.1);">
        <input type="text" id="n" placeholder="姓名 (全名)" style="padding:10px; margin:5px;"><br>
        <input type="text" id="p" placeholder="手機末 4 位" style="padding:10px; margin:5px;"><br>
        <button onclick="check()" style="padding:10px 20px; background:#f39c12; color:white; border:none; border-radius:5px; cursor:pointer; margin-top:10px;">開始查詢</button>
        <div id="res" style="margin-top:20px; font-weight:bold; color:#2c3e50;"></div>
    </div>

    <script>
    async function check() {
        const out = document.getElementById('res');
        out.innerText = "查詢中...";
        try {
            const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRGpv5GQ4HLRd7LfPeaTrPA9LB3ct-IiHXdUEZ7Ck1av3Or4N_v1-aMa1iJFd6rfwbUlTUoZECqiaX2/pub?output=csv';
            const response = await fetch(url);
            const text = await response.text();
            const rows = text.split('\n');
            const name = document.getElementById('n').value.trim();
            const phone = document.getElementById('p').value.trim();
            
            let found = false;
            for(let i=1; i<rows.length; i++) {
                const cols = rows[i].split(',');
                if(cols[0].trim().toLowerCase() === name.toLowerCase() && cols[1].trim() === phone) {
                    out.innerHTML = "✅ 查詢成功！<br>會員編號：" + cols[2];
                    found = true;
                    break;
                }
            }
            if(!found) out.innerText = "❌ 找不到資料，請檢查姓名和電話。";
        } catch (e) {
            out.innerText = "⚠️ 系統連線出錯，請稍後再試。";
        }
    }
    </script>
</body>
</html>
