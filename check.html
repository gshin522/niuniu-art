<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心願 FM 會員查詢</title>
    <style>
        :root { --primary: #f39c12; --gold: #ffd700; --dark: #2c3e50; --bg: #fdf2e9; }
        body { background-color: var(--bg); font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; padding: 35px 25px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 350px; }
        h2 { color: var(--primary); margin: 0 0 20px 0; font-size: 24px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 16px; transition: border-color 0.3s; }
        input:focus { outline: none; border-color: var(--primary); }
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 18px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        
        #result { margin-top: 25px; display: none; text-align: left; }
        .member-card { background: var(--dark); color: white; padding: 25px; border-radius: 20px; position: relative; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .member-card::after { content: '🎙️'; position: absolute; right: -10px; bottom: -10px; font-size: 80px; opacity: 0.1; }
        
        .label { font-size: 11px; color: #bdc3c7; margin-bottom: 3px; letter-spacing: 1px; }
        .value { font-size: 18px; font-weight: bold; margin-bottom: 15px; }
        .id-value { font-size: 22px; color: var(--primary); }
        
        /* 標籤樣式 */
        .tag { display: inline-block; padding: 5px 12px; border-radius: 8px; font-size: 12px; font-weight: bold; margin-top: 5px; }
        .tag-forever { background: var(--gold); color: #000; box-shadow: 0 0 10px rgba(255, 215, 0, 0.4); }
        .tag-normal { background: #3498db; color: #fff; }

        .error { color: #e74c3c; margin-top: 20px; font-size: 14px; display: none; padding: 15px; background: #fdeaea; border-radius: 12px; line-height: 1.5; }
        .whatsapp-btn { display: inline-block; margin-top: 10px; padding: 8px 15px; background: #25d366; color: white; border-radius: 8px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>📻 心願 FM 查詢</h2>
    <div style="font-size: 13px; color: #95a5a6; margin-bottom: 20px;">請輸入註冊資料進行驗證</div>
    
    <input type="text" id="nameInput" placeholder="會員全名 (簡繁皆可)">
    <input type="tel" id="phoneInput" placeholder="手機末 4 位數" maxlength="4">
    <button onclick="doSearch()">立即查詢</button>
    
    <div id="errorMsg" class="error">
        查無此人。若您換過號碼，請聯繫管理員協助：<br>
        <a id="waLink" href="#" target="_blank" class="whatsapp-btn">💬 聯絡心願熱線</a>
    </div>
    
    <div id="result">
        <div class="member-card">
            <div class="label">姓名 NAME</div>
            <div id="resName" class="value">---</div>
            
            <div class="label">編號 ID</div>
            <div id="resID" class="value id-value">---</div>
            
            <div class="label">類別 CATEGORY</div>
            <div id="resTypeTag" class="tag">---</div>
            
            <div style="margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; font-size: 11px; color: #95a5a6; text-align:center;">心願 FM · 始終溫暖你的心</div>
        </div>
    </div>
</div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRGpv5GQ4HLRd7LfPeaTrPA9LB3ct-IiHXdUEZ7Ck1av3Or4N_v1-aMa1iJFd6rfwbUlTUoZECqiaX2/pub?output=csv';
    const hotLine = "60149696608"; // WhatsApp 格式

    async function doSearch() {
        const nameInput = document.getElementById('nameInput').value.replace(/\s+/g, '').toUpperCase();
        const phoneInput = document.getElementById('phoneInput').value.replace(/\s+/g, '');
        const resDiv = document.getElementById('result');
        const errDiv = document.getElementById('errorMsg');
        const btn = document.querySelector('button');

        if(!nameInput || !phoneInput) { alert("請填寫姓名和電話末4位"); return; }

        btn.innerText = "查詢中...";
        try {
            const resp = await fetch(csvUrl + '&t=' + new Date().getTime());
            const text = await resp.text();
            const lines = text.split(/\r?\n/).filter(l => l.trim() !== "");
            
            let found = false;
            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(',').map(c => c.replace(/"/g, '').trim());
                if (cols.length >= 3) {
                    const dbName = cols[0].replace(/\s+/g, '').toUpperCase();
                    // 即使表格是全號碼，也能自動抓最後4位
                    const dbPhone = cols[1].replace(/\D/g, '').slice(-4);

                    if (dbName === nameInput && dbPhone === phoneInput) {
                        document.getElementById('resName').innerText = cols[0];
                        document.getElementById('resID').innerText = cols[2];
                        
                        // 類別判斷 (兼容簡繁體)
                        const dbType = cols[3] || "普通会员";
                        const isForever = (dbType === "永久会员" || dbType === "永久會員");
                        
                        const tag = document.getElementById('resTypeTag');
                        tag.innerText = dbType;
                        tag.className = isForever ? "tag tag-forever" : "tag tag-normal";

                        resDiv.style.display = 'block';
                        errDiv.style.display = 'none';
                        found = true;
                        break;
                    }
                }
            }
            if (!found) {
                resDiv.style.display = 'none';
                errDiv.style.display = 'block';
                // 設置預設 WhatsApp 文字
                const msg = encodeURIComponent("心愿FM好，我是会员但透过网页查询不到会员编号，请协助，谢谢。");
                document.getElementById('waLink').href = `https://wa.me/${hotLine}?text=${msg}`;
            }
        } catch (e) {
            alert("網路連線不穩定，請重試");
        } finally {
            btn.innerText = "立即查詢";
        }
    }
</script>

</body>
</html>
