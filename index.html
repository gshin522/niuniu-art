<script>
    var googleScriptUrl = 'https://script.google.com/macros/s/AKfycbyNgKa4LAURh5jENB9-gfa2nQOHWm-Nz7DHPwFXMIkrfJwntQYAZ9ADN5CK2kVAMnwW/exec';
    var currentQuote = "";

    window.onload = function() { loadQuote(); window.speechSynthesis.getVoices(); };

    function loadQuote() {
        var script = document.createElement('script');
        script.src = googleScriptUrl + '?callback=displayQuote';
        document.body.appendChild(script);
    }

    function displayQuote(data) {
        currentQuote = String(data.quote || "").replace(/["'“”]/g, "").trim();
        document.getElementById('quote-text').innerText = currentQuote;
        if (data.bgImage) {
            var imgUrl = String(data.bgImage).replace(/["'\s]/g, "");
            document.getElementById('bg-layer').style.backgroundImage = 'url(' + imgUrl + ')';
        }
    }

    function speakQuote() {
        if (!currentQuote) return;
        window.speechSynthesis.cancel();
        
        // 彈窗測試：如果看到這個彈窗，說明代碼沒問題
        // alert("代碼正在啟動朗讀：" + currentQuote); 

        var msg = new SpeechSynthesisUtterance();
        msg.text = currentQuote;
        msg.lang = 'zh-CN';
        msg.rate = 0.8;
        
        // 核心：點擊喇叭時，強行觸發播放
        window.speechSynthesis.speak(msg);
    }
</script>
