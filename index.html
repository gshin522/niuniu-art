<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>牛牛畫廊 · 語音最強版</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background-color: #000; overflow: hidden; font-family: 'Noto Sans SC', sans-serif; }
        
        /* 背景圖層 */
        #bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1531306728370-e2ebd9d7bb99') no-repeat center center;
            background-size: cover !important;
            z-index: 1; transition: background 1.5s ease;
        }

        /* 內容層 */
        .content-overlay {
            position: relative; z-index: 10; 
            display: flex; align-items: center; justify-content: center;
            height: 100vh; width: 100vw;
        }

        /* 磨砂卡片 */
        .quote-card {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 40px 25px; border-radius: 25px;
            width: 80%; max-width: 400px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* 喇叭按鈕 */
        .audio-btn {
            background: rgba(255,255,255,0.6); border: none; border-radius: 50%;
            width: 60px; height: 60px; cursor: pointer;
            margin-bottom: 20px; display: inline-flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .audio-btn svg { width: 30px; height: 30px; fill: #1a1a1a; }

        h1 { color: #1a1a1a; font-size: 28px; line-height: 1.5; margin: 0 0 20px 0; }

        .footer { display: flex; flex-direction: column; align-items: center; font-size: 12px; color: rgba(0,0,0,0.6); }
        .footer img { width: 50px; height: 50px; border-radius: 50%; margin-bottom: 10px; border: 2px solid #fff; }
    </style>
</head>
<body>
    <div id="bg-layer"></div>
    <div class="content-overlay">
        <div class="quote-card">
            <button class="audio-btn" onclick="speakQuote()">
                <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
            </button>
            
            <h1 id="quote-text">正在加載...</h1>
            
            <div class="footer">
                <img src="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?w=100" alt="Logo">
                <span>牛牛畫廊 · 智能藝術</span>
            </div>
        </div>
    </div>

    <script>
        var googleScriptUrl = 'https://script.google.com/macros/s/AKfycbyNgKa4LAURh5jENB9-gfa2nQOHWm-Nz7DHPwFXMIkrfJwntQYAZ9ADN5CK2kVAMnwW/exec';
        var currentQuote = "";

        // 頁面加載時啟動
        window.onload = function() {
            loadQuote();
            // 預熱語音引擎
            window.speechSynthesis.getVoices();
        };

        function loadQuote() {
            var script = document.createElement('script');
            script.src = googleScriptUrl + '?callback=displayQuote';
            document.body.appendChild(script);
        }

        function displayQuote(data) {
            var cleanQuote = String(data.quote || "").replace(/["'“”]/g, "").trim();
            var cleanImg = String(data.bgImage || "").replace(/["'“”\s]/g, "").trim();
            
            currentQuote = cleanQuote;
            document.getElementById('quote-text').innerText = cleanQuote;
            
            if (cleanImg.startsWith('http')) {
                document.getElementById('bg-layer').style.backgroundImage = 'url(' + cleanImg + ')';
            }
        }

        // 這是你要找的 speakQuote 函數，我把它強化了
        function speakQuote() {
            if (!currentQuote) return;

            // 1. 停止之前的聲音
            window.speechSynthesis.cancel();

            // 2. 創建語音對象
            var msg = new SpeechSynthesisUtterance();
            msg.text = currentQuote;
            msg.lang = 'zh-CN'; 
            msg.rate = 0.8;  // 稍微慢一點
            msg.volume = 1;  // 音量最大

            // 3. 嘗試尋找中文語音包（有些手機需要這一步）
            var voices = window.speechSynthesis.getVoices();
            var chineseVoice = voices.find(v => v.lang.includes('zh') || v.lang.includes('CN'));
            if (chineseVoice) msg.voice = chineseVoice;

            // 4. 發聲！
            window.speechSynthesis.speak(msg);
        }
    </script>
</body>
</html>
