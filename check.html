<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>心愿 FM - 会员系统</title>
    <style>
        :root { --primary: #E08870; --bg-soft: #E7A595; }
        body { background-color: var(--bg-soft); font-family: "Microsoft YaHei", sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; flex-direction: column; overflow-x: hidden;}
        
        /* 查询界面 */
        .search-container { background: white; padding: 30px 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 350px; transition: 0.3s; }
        .logo-img { width: 80px; margin-bottom: 10px; }
        h2 { color: var(--primary); margin: 0; }
        .slogan { color: #8e7470; font-size: 12px; margin: 5px 0 20px 0; }
        input { width: 100%; padding: 14px; margin: 8px 0; border: 2px solid #f3e0dc; border-radius: 12px; box-sizing: border-box; font-size: 16px; background: #fffaf9; }
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 17px; cursor: pointer; font-weight: bold; margin-top: 10px; }

        /* 会员卡预览层 */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; flex-direction: column; padding: 20px; box-sizing: border-box; }
        
        /* 会员卡图片样式：支持普通模式和全屏模式 */
        #memberCardImg { 
            width: 100%; 
            max-width: 350px; 
            border-radius: 15px; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: zoom-in;
            box-shadow: 0 0 40px rgba(255,255,255,0.2);
        }

        /* 全屏放大样式 */
        #memberCardImg.fullscreen { 
            max-width: 100vw; 
            width: 100vw; 
            height: auto; 
            border-radius: 0; 
            cursor: zoom-out;
            box-shadow: none;
        }

        .tip-text { color: rgba(255,255,255,0.6); font-size: 12px; margin-top: 15px; margin-bottom: 15px;}
        .close-btn { color: white; border: 1.5px solid rgba(255,255,255,0.5); padding: 10px 30px; border-radius: 30px; cursor: pointer; font-size: 14px; }

        .error { color: #c0392b; margin-top: 20px; font-size: 14px; display: none; background: #fff0ed; padding: 15px; border-radius: 12px; text-align: center; }
    </style>
</head>
<body>

    <div class="search-container" id="searchBox">
        <img src="https://i.ibb.co/ycBDJ23z/logo.png" class="logo-img">
        <h2>心愿 FM</h2>
        <div class="slogan">聆听陪伴，共享法悦</div>
        <input type="text" id="nameInput" placeholder="输入姓名 (中文或英文)">
        <input type="tel" id="phoneInput" placeholder="手机号末 4 位" maxlength="4">
        <button onclick="doSearch()">查询我的电子会员证</button>
        <div id="errorMsg" class="error">
            查无资料。请检查姓名和电话末4位。<br>
            需要协助？<a href="https://wa.me/60149696608" style="color: #25d366; font-weight: bold; text-decoration: none;">💬 点此联系热线</a>
        </div>
    </div>

    <div id="modal">
        <div class="tip-text" id="tipText">点击图片放大/还原</div>
        <img id="memberCardImg" src="" onclick="toggleFullscreen()" alt="电子会员证">
        <div class="close-btn" id="closeBtn" onclick="closeModal()">返回修改资料</div>
    </div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRGpv5GQ4HLRd7LfPeaTrPA9LB3ct-IiHXdUEZ7Ck1av3Or4N_v1-aMa1iJFd6rfwbUlTUoZECqiaX2/pub?output=csv';

    async function doSearch() {
        const userInput = document.getElementById('nameInput').value.replace(/\s+/g, '').toUpperCase();
        const phoneInput = document.getElementById('phoneInput').value.replace(/\s+/g, '');
        const btn = document.querySelector('button');
        const errDiv = document.getElementById('errorMsg');

        if(!userInput || !phoneInput) { alert("请填写完整信息"); return; }

        btn.innerText = "正在为您寻找会员证...";
        btn.disabled = true;

        try {
            const resp = await fetch(csvUrl + '&t=' + new Date().getTime());
            const text = await resp.text();
            const lines = text.split(/\r?\n/).filter(l => l.trim() !== "");
            
            let found = false;
            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(',').map(c => c.replace(/"/g, '').trim());
                if (cols.length >= 6) { 
                    const dbChi = cols[0].replace(/\s+/g, '').toUpperCase();
                    const dbEng = (cols[4] || "").replace(/\s+/g, '').toUpperCase();
                    const dbPhone = cols[1].replace(/\D/g, '').slice(-4);

                    if ((dbChi === userInput || dbEng === userInput) && dbPhone === phoneInput) {
                        const imgUrl = cols[5]; 
                        if(imgUrl && imgUrl.startsWith('http')) {
                            document.getElementById('memberCardImg').src = imgUrl;
                            document.getElementById('modal').style.display = 'flex';
                            document.getElementById('searchBox').style.display = 'none';
                            errDiv.style.display = 'none';
                        } else {
                            alert("会员证链接配置中，请联络管理员。");
                        }
                        found = true;
                        break;
                    }
                }
            }
            if (!found) errDiv.style.display = 'block';
        } catch (e) {
            alert("系统繁忙");
        } finally {
            btn.innerText = "查询我的电子会员证";
            btn.disabled = false;
        }
    }

    // 点击图片放大/缩小的神奇逻辑
    function toggleFullscreen() {
        const img = document.getElementById('memberCardImg');
        const btn = document.getElementById('closeBtn');
        const tip = document.getElementById('tipText');
        
        img.classList.toggle('fullscreen');
        
        // 全屏时隐藏按钮和提示，让画面更干净
        if(img.classList.contains('fullscreen')) {
            btn.style.visibility = 'hidden';
            tip.style.visibility = 'hidden';
        } else {
            btn.style.visibility = 'visible';
            tip.style.visibility = 'visible';
        }
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        document.getElementById('searchBox').style.display = 'block';
        // 确保下次打开时不是全屏
        document.getElementById('memberCardImg').classList.remove('fullscreen');
        document.getElementById('closeBtn').style.visibility = 'visible';
    }
</script>
</body>
</html>
