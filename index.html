<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>牛牛畫廊 · 靜思語</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; overflow: hidden; font-family: sans-serif; color: #fff; }
        
        /* 1. 初始背景層 (全黑) */
        #bg-initial {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: #000;
            z-index: 1;
            transition: opacity 1s;
        }

        /* 2. 靜思中背景層 (載入中浮現) */
        #bg-waiting {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: url('https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?w=500') center/cover;
            z-index: 2;
            opacity: 0; /* 初始隱藏 */
            transition: opacity 1s;
            filter: brightness(0.6) blur(2px);
        }

        /* 3. 終極背景層 (語錄載入後換上) */
        #bg-final {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: #1a1a1a; background-size: cover; background-position: center;
            z-index: 3;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            filter: brightness(0.7);
        }

        .wrap { position: relative; z-index:10; display: flex; align-items: center; justify-content: center; height: 100vh; width: 100vw; cursor: pointer; }
        .card { 
            background: rgba(255,255,255,0.1); 
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); 
            padding: 50px 30px; border-radius: 40px; width: 80%; max-width: 450px; 
            text-align: center; border: 1px solid rgba(255,255,255,0.1);
            transition: 1s opacity, 1s transform; 
            opacity: 0; /* 初始隱藏 */
            transform: translateY(20px);
        }
        h1 { font-size: 32px; line-height: 1.5; margin: 0 0 30px 0; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .logo { width: 60px; height: 60px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.8); margin-bottom: 15px; }
        .footer { font-size: 14px; opacity: 0.8; letter-spacing: 1px; }
        .hint { position: fixed; bottom: 30px; width: 100%; text-align: center; font-size: 12px; opacity: 0.5; z-index: 20; transition: 1s; }
    </style>
</head>
<body>
    <div id="bg-initial"></div>
    <div id="bg-waiting"></div>
    <div id="bg-final"></div>

    <div class="wrap" onclick="activateAndSpeak()">
        <div class="card" id="main-card">
            <h1 id="txt"></h1>
            <img src="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?w=100" class="logo">
            <div class="footer">牛牛畫廊 · 智能藝術</div>
        </div>
    </div>
    <div class="hint" id="hint-msg">正在感知天地精華...</div>

    <script>
        var sUrl = 'https://script.google.com/macros/s/AKfycbyNgKa4LAURh5jENB9-gfa2nQOHWm-Nz7DHPwFXMIkrfJwntQYAZ9ADN5CK2kVAMnwW/exec';
        var quote = "";

        // 啟動數據加載
        function load() {
            var s = document.createElement('script');
            s.src = sUrl + '?callback=cb';
            document.body.appendChild(s);

            // 啟動 0.5 秒後，浮現等待背景，並更改提示
            setTimeout(function() {
                if(!quote) { // 如果數據還沒到
                    document.getElementById('bg-waiting').style.opacity = "1";
                    document.getElementById('hint-msg').innerText = "靜思中...";
                }
            }, 500);
        }

        function cb(d) {
            quote = d.quote.replace(/["'“”]/g, "").trim();
            document.getElementById('txt').innerText = quote;
            if(d.bgImage) {
                var img = d.bgImage.replace(/["'\s]/g, "");
                document.getElementById('bg-final').style.backgroundImage = "url('" + img + "')";
            }
            // 核心：抓到數據後瞬间换上极光，淡入卡片
            document.getElementById('bg-waiting').style.opacity = "0";
            document.getElementById('bg-final').style.opacity = "1";
            
            document.getElementById('main-card').style.opacity = "1";
            document.getElementById('main-card').style.transform = "translateY(0)";
            document.getElementById('hint-msg').innerText = "點擊屏幕 聆聽智慧";
            document.getElementById('hint-msg').style.opacity = "0.7";
        }

        function activateAndSpeak() {
            if(!quote) return;
            
            // 語音朗讀
            window.speechSynthesis.cancel();
            var u = new SpeechSynthesisUtterance(quote);
            u.lang = 'zh-CN';
            u.rate = 0.85;
            window.speechSynthesis.speak(u);

            // 點擊後隱藏提示
            document.getElementById('hint-msg').style.display = "none";
        }

        window.onload = load;
    </script>
</body>
</html>
