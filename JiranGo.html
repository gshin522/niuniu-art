<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JiranGo - 邻里跑腿</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f7f9fc; font-family: 'Courier New', Courier, monospace; }
        .receipt-card { border-radius: 20px; background: white; box-shadow: 0 10px 25px rgba(0,0,0,0.05); position: relative; }
        .receipt-card::before { content: ""; position: absolute; top: -10px; left: 0; right: 0; height: 20px; background-image: radial-gradient(circle, transparent 70%, white 70%); background-size: 20px 20px; }
        .dot-line { border-top: 2px dashed #e5e7eb; margin: 15px 0; }
        .item-input { border: none; border-bottom: 1px solid #f3f4f6; width: 100%; padding: 8px 0; font-size: 14px; background: transparent; }
        .item-input:focus { outline: none; border-bottom-color: #3b82f6; }
        .photo-toggle { cursor: pointer; transition: all 0.3s; opacity: 0.2; filter: grayscale(1); }
        .photo-toggle.active { opacity: 1; filter: grayscale(0); transform: scale(1.2); }
    </style>
</head>
<body class="p-4 pb-24">

    <div class="text-center mb-6 pt-4">
        <h1 class="text-2xl font-black text-blue-600 tracking-tighter">🚗 JiranGo</h1>
        <p class="text-xs text-gray-400 uppercase tracking-widest">Neighborhood Runner Service</p>
    </div>

    <div class="receipt-card p-6 pb-8">
        <div class="flex justify-between items-center mb-4">
            <span class="text-sm font-bold text-gray-500">SERVICE ORDER</span>
            <span id="order-date" class="text-xs text-gray-400"></span>
        </div>

        <div class="mb-6">
            <label class="text-[10px] font-bold text-blue-500 uppercase">Delivery Address</label>
            <input type="text" id="address" placeholder="No. 12, Jalan SG 1/..." class="item-input font-sans font-medium text-gray-800">
        </div>

        <div class="dot-line"></div>

        <div class="mb-4">
            <label class="text-[10px] font-bold text-blue-500 uppercase mb-2 block">Shopping List</label>
            <div id="items-list" class="space-y-4">
                <div class="flex items-center gap-3">
                    <span class="text-gray-300 text-xs">01</span>
                    <input type="text" placeholder="想要买什么?" class="item-input font-sans text-gray-700">
                    <div onclick="togglePhoto(this)" class="photo-toggle text-xl">📸</div>
                </div>
                <div class="flex items-center gap-3">
                    <span class="text-gray-300 text-xs">02</span>
                    <input type="text" placeholder="想要买什么?" class="item-input font-sans text-gray-700">
                    <div onclick="togglePhoto(this)" class="photo-toggle text-xl">📸</div>
                </div>
                <div class="flex items-center gap-3">
                    <span class="text-gray-300 text-xs">03</span>
                    <input type="text" placeholder="想要买什么?" class="item-input font-sans text-gray-700">
                    <div onclick="togglePhoto(this)" class="photo-toggle text-xl">📸</div>
                </div>
            </div>
            
            <button onclick="addItemRow()" class="mt-4 text-[10px] text-blue-500 font-bold border border-blue-200 px-3 py-1 rounded-full">+ ADD MORE ITEM</button>
        </div>

        <div class="dot-line mt-6"></div>
        
        <p class="text-[10px] text-gray-400 italic text-center mb-6">"Connecting Neighbors, Delivering Care"</p>

        <button onclick="sendOrder()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg flex items-center justify-center gap-2 active:scale-95 transition-transform">
            <span>CONFIRM & WHATSAPP</span>
        </button>
    </div>

    <script>
        // 设置日期
        document.getElementById('order-date').innerText = new Date().toLocaleDateString();

        // 切换照片标记
        function togglePhoto(el) {
            el.classList.toggle('active');
        }

        // 增加行
        function addItemRow() {
            const list = document.getElementById('items-list');
            const count = list.children.length + 1;
            if(count > 6) return alert("最多 6 个项目哦！");
            
            const div = document.createElement('div');
            div.className = "flex items-center gap-3";
            div.innerHTML = `
                <span class="text-gray-300 text-xs">0${count}</span>
                <input type="text" placeholder="想要买什么?" class="item-input font-sans text-gray-700">
                <div onclick="togglePhoto(this)" class="photo-toggle text-xl">📸</div>
            `;
            list.appendChild(div);
        }

        // 下单到 WhatsApp
        function sendOrder() {
            const address = document.getElementById('address').value;
            if(!address) return alert("老板，还没填地址呢！");

            const rows = document.querySelectorAll('#items-list > div');
            let itemList = "";
            let hasPhoto = false;

            rows.forEach((row, index) => {
                const input = row.querySelector('input');
                const isPhoto = row.querySelector('.photo-toggle').classList.contains('active');
                if(input.value.trim() !== "") {
                    const icon = isPhoto ? " 📸 (有图参考)" : "";
                    if(isPhoto) hasPhoto = true;
                    itemList += `%0A${index+1}. ${input.value}${icon}`;
                }
            });

            if(!itemList) return alert("清单还是空的哦！");

            const phone = "60126947903";
            const photoNote = hasPhoto ? "%0A%0A⚠️ *温馨提醒：跑腿员收到讯息后，请记得补发参考照片哦！*" : "";
            
            const text = `🚗 *JiranGo 邻里新订单*%0A------------------%0A📍 *地址*: ${address}%0A📝 *购物清单*:${itemList}${photoNote}`;
            
            window.location.href = `https://wa.me/${phone}?text=${text}`;
        }
    </script>
</body>
</html>
