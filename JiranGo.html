<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JiranGo - 邻里跑腿</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="JiranGo">
    <link rel="apple-touch-icon" href="icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        .app-card { border-radius: 1.5rem; transition: all 0.2s ease; cursor: pointer; border: 2px solid transparent; }
        .app-card:active { transform: scale(0.95); }
        .app-card.selected { border-color: #2563eb; background-color: #eff6ff; }
        .nav-active { color: #2563eb; }
        /* 隐藏原生文件输入，用按钮触发 */
        #file-input { display: none; }
    </style>
</head>
<body class="pb-20">

    <header class="bg-white p-4 shadow-sm sticky top-0 z-10">
        <h1 class="text-xl font-bold text-gray-800 text-center">🚗 JiranGo 邻里跑腿</h1>
    </header>

    <main class="p-4 space-y-4">
        <div class="grid grid-cols-3 gap-3">
            <button id="service-food" onclick="selectService('代购美食', 'service-food')" class="app-card bg-orange-100 p-4 text-center shadow-sm selected">
                <div class="text-3xl mb-1">🍜</div>
                <div class="text-xs font-bold text-orange-800">代购美食</div>
            </button>
            <button id="service-parcel" onclick="selectService('包裹派送', 'service-parcel')" class="app-card bg-blue-100 p-4 text-center shadow-sm">
                <div class="text-3xl mb-1">📦</div>
                <div class="text-xs font-bold text-blue-800">包裹派送</div>
            </button>
            <button id="service-life" onclick="selectService('生活代办', 'service-life')" class="app-card bg-green-100 p-4 text-center shadow-sm">
                <div class="text-3xl mb-1">💊</div>
                <div class="text-xs font-bold text-green-800">生活代办</div>
            </button>
        </div>

        <div id="order-form" class="bg-white p-6 rounded-3xl shadow-md space-y-4">
            <h2 id="service-title" class="text-lg font-bold text-gray-700">正在预约：代购美食</h2>
            
            <div>
                <label class="block text-sm text-gray-500 mb-1">您的地址 (只限本社区)</label>
                <input type="text" id="address" placeholder="例如：No. 12, Jalan 1/2" class="w-full p-3 bg-gray-50 rounded-xl border-none focus:ring-2 focus:ring-blue-400">
            </div>

            <div>
                <label class="block text-sm text-gray-500 mb-1">详情描述</label>
                <textarea id="details" rows="3" placeholder="想买什么？或包裹尺寸？" class="w-full p-3 bg-gray-50 rounded-xl border-none focus:ring-2 focus:ring-blue-400"></textarea>
            </div>

            <div>
                <label class="block text-sm text-gray-500 mb-1">参考图片 (可选)</label>
                <input type="file" id="file-input" accept="image/*" onchange="updateFileInfo()">
                <button onclick="document.getElementById('file-input').click()" class="w-full flex items-center justify-center gap-2 p-3 bg-gray-100 text-gray-700 rounded-xl hover:bg-gray-200">
                    <span class="text-xl">📷</span>
                    <span id="file-status">拍照或上传</span>
                </button>
            </div>

            <button onclick="submitToWA()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg shadow-lg hover:bg-blue-700 transition-all flex items-center justify-center gap-2">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="h-6 w-6" alt="WA">
                确认下单 (WhatsApp)
            </button>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-3 shadow-lg">
        <div class="text-center nav-active">
            <div class="text-2xl">🏠</div>
            <div class="text-[10px]">首页</div>
        </div>
        <div class="text-center text-gray-400">
            <div class="text-2xl">📋</div>
            <div class="text-[10px]">订单</div>
        </div>
        <div class="text-center text-gray-400">
            <div class="text-2xl">👤</div>
            <div class="text-[10px]">我的</div>
        </div>
    </nav>

    <script>
        let currentService = "代购美食";

        function selectService(name, elementId) {
            currentService = name;
            document.getElementById('service-title').innerText = "正在预约：" + name;
            // 清除旧选中，添加新选中样式
            document.querySelectorAll('.app-card').forEach(el => el.classList.remove('selected'));
            document.getElementById(elementId).classList.add('selected');
        }

        function updateFileInfo() {
            const input = document.getElementById('file-input');
            const status = document.getElementById('file-status');
            if (input.files.length > 0) {
                status.innerText = "已选择：1张图片";
                status.classList.add('text-blue-600');
            } else {
                status.innerText = "拍照或上传";
                status.classList.remove('text-blue-600');
            }
        }

        function submitToWA() {
            const address = document.getElementById('address').value;
            const details = document.getElementById('details').value;
            const fileInput = document.getElementById('file-input');
            
            if(!address || !details) return alert("请填好地址和详情哦！");

            // 1. 修改 WhatsApp 号码
            const phone = "60126947903"; 
            
            let photoNote = "";
            if (fileInput.files.length > 0) {
                photoNote = "%0A📸 *注意：客户已在 APP 上传图片，请在对话框补发图片以供参考。*";
            }

            const text = `🚗 *JiranGo 新订单* %0A------------------%0A项目: ${currentService}%0A地址: ${address}%0A描述: ${details}${photoNote}`;
            
            window.location.href = `https://wa.me/${phone}?text=${text}`;
        }
    </script>
</body>
</html>
