<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JiranGo - 邻里跑腿</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f7f9fc; font-family: system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .big-input { width: 100%; border-radius: 14px; border: 2px solid #e5e7eb; padding: 14px; font-size: 18px; font-weight: 600; color: #1f2937; background: white; }
        .price-input { width: 80px; border-radius: 10px; border: 2px solid #e5e7eb; padding: 10px; font-size: 16px; text-align: center; color: #2563eb; font-weight: bold; }
        .service-card { border-radius: 1.5rem; transition: all 0.2s ease; cursor: pointer; border: 3px solid transparent; }
        .service-card.selected { border-color: #2563eb; background-color: #eff6ff; box-shadow: 0 8px 20px rgba(37,99,235,0.1); }
        .check-box { width: 28px; height: 28px; border: 3px solid #d1d5db; border-radius: 8px; position: relative; background: white; }
        input:checked + .check-box { background-color: #2563eb; border-color: #2563eb; }
        input:checked + .check-box::after { content: "✓"; color: white; position: absolute; top: -2px; left: 4px; font-weight: bold; font-size: 20px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        /* 电脑版适配：限制二维码最大宽度 */
        .qr-container { max-width: 200px; margin: 0 auto; border-radius: 20px; overflow: hidden; background: #f3f4f6; }
        @keyframes bounceIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .animate-in { animation: bounceIn 0.2s ease-out; }
    </style>
</head>
<body class="pb-40">

    <div id="alert-modal" class="modal">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 text-center animate-in shadow-2xl">
            <div class="text-5xl mb-4">⚠️</div>
            <h3 class="text-2xl font-black text-gray-800 mb-2">JiranGo 提示</h3>
            <p id="alert-msg" class="text-gray-500 mb-8 font-medium"></p>
            <button onclick="closeAlert()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-lg shadow-lg">知道啦 🚗</button>
        </div>
    </div>

    <header class="bg-white px-4 py-6 shadow-sm sticky top-0 z-20 border-b-2 border-blue-50 text-center font-black text-2xl text-blue-600">
        🚗 JiranGo
    </header>

    <main class="p-4 space-y-6">
        <div class="grid grid-cols-2 gap-4">
            <div id="btn-buy" onclick="showForm('buy')" class="service-card p-6 text-center shadow-md bg-orange-100 selected">
                <div class="text-5xl mb-2">🛒</div>
                <div class="text-lg font-black text-orange-900">帮忙买</div>
            </div>
            <div id="btn-send" onclick="showForm('send')" class="service-card p-6 text-center shadow-md bg-blue-100">
                <div class="text-5xl mb-2">📦</div>
                <div class="text-lg font-black text-blue-900">帮忙送</div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border-2 border-gray-50">
            <div id="form-buy" class="space-y-5">
                <label class="text-xs font-black text-blue-500 uppercase ml-1">送货到哪里？</label>
                <input type="text" id="buy-address" placeholder="例: No.12, Jalan SG 1/..." class="big-input mt-1">
                <div class="flex justify-between text-[10px] font-black text-gray-400 uppercase px-1">
                    <span>物品名称</span><span>预估价</span><span>有图</span>
                </div>
                <div id="buy-items" class="space-y-4">
                    <div class="flex items-center gap-2">
                        <input type="text" placeholder="想买什么?" class="big-input flex-1 item-name" oninput="calculateTotal()">
                        <input type="number" placeholder="0" class="price-input item-price" oninput="calculateTotal()">
                        <label class="flex flex-col items-center"><input type="checkbox" class="hidden item-has-photo"><div class="check-box"></div></label>
                    </div>
                </div>
                <button onclick="addRow('buy-items')" class="text-sm font-black text-blue-600">+ 增加项目</button>
            </div>

            <div id="form-send" class="space-y-5 hidden">
                <input type="text" id="send-pickup" placeholder="哪里取货？" class="big-input">
                <input type="text" id="send-dropoff" placeholder="送到哪里？" class="big-input">
                <div id="send-items" class="space-y-4">
                    <div class="flex items-center gap-3">
                        <input type="text" placeholder="货品描述" class="big-input flex-1 item-name">
                        <label class="flex flex-col items-center"><input type="checkbox" class="hidden item-has-photo"><div class="check-box"></div><span class="text-[10px] font-bold text-gray-400">有图</span></label>
                    </div>
                </div>
                <button onclick="addRow('send-items')" class="text-sm font-black text-blue-600">+ 增加货品</button>
            </div>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t-4 border-blue-50 p-5 shadow-2xl z-30">
        <div class="flex justify-between items-center mb-4">
            <div><span class="text-gray-400 text-[10px] font-black uppercase">Estimated Total</span><div class="text-3xl font-black text-blue-600">RM <span id="total-price">8.00</span></div></div>
            <div class="text-right text-[10px] text-gray-400 font-bold leading-tight">跑腿费: RM <span id="delivery-fee">8.00</span><br>货品预估: RM <span id="items-cost">0.00</span></div>
        </div>
        <button onclick="openPayment()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-xl shadow-lg">确认下单 & 去付款</button>
    </div>

    <div id="pay-modal" class="modal">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-6 text-center space-y-4 animate-in">
            <h2 class="text-xl font-black">转账给 JiranGo</h2>
            <p class="text-4xl font-black text-blue-600">RM <span id="modal-total">8.00</span></p>
            <div class="qr-container aspect-square flex items-center justify-center border-4 border-dashed border-gray-200">
                <span class="text-gray-400 font-bold text-xs p-4">请放入 TNG QR 图片</span>
            </div>
            <p class="text-[11px] text-gray-400 font-bold">货品价格多退少补，请在下个页面发送收据图。</p>
            <button onclick="finishOrder()" class="w-full bg-green-500 text-white py-4 rounded-2xl font-black text-lg">已付款，发送通知</button>
            <button onclick="closeModal('pay-modal')" class="text-gray-400 text-sm font-bold block mx-auto">返回修改</button>
        </div>
    </div>

    <script>
        let currentType = 'buy';

        function jiranAlert(msg) {
            document.getElementById('alert-msg').innerText = msg;
            document.getElementById('alert-modal').style.display = 'flex';
        }
        function closeAlert() { document.getElementById('alert-modal').style.display = 'none'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function showForm(type) {
            currentType = type;
            document.getElementById('btn-buy').classList.toggle('selected', type === 'buy');
            document.getElementById('btn-send').classList.toggle('selected', type === 'send');
            document.getElementById('form-buy').classList.toggle('hidden', type !== 'buy');
            document.getElementById('form-send').classList.toggle('hidden', type !== 'send');
            calculateTotal();
        }

        function addRow(id) {
            const div = document.createElement('div');
            div.className = "flex items-center gap-2";
            if(currentType === 'buy') {
                div.innerHTML = `<input type="text" placeholder="..." class="big-input flex-1 item-name" oninput="calculateTotal()"><input type="number" placeholder="0" class="price-input item-price" oninput="calculateTotal()"><label class="flex flex-col items-center"><input type="checkbox" class="hidden item-has-photo"><div class="check-box"></div></label>`;
            } else {
                div.innerHTML = `<input type="text" placeholder="..." class="big-input flex-1 item-name"><label class="flex flex-col items-center"><input type="checkbox" class="hidden item-has-photo"><div class="check-box"></div><span class="text-[10px] font-bold text-gray-400">有图</span></label>`;
            }
            document.getElementById(id).appendChild(div);
        }

        function calculateTotal() {
            let deliveryFee = (currentType === 'buy') ? 8.0 : 6.0;
            let itemsCost = 0;
            if(currentType === 'buy') {
                document.querySelectorAll('#form-buy .item-price').forEach(p => { itemsCost += parseFloat(p.value || 0); });
            }
            document.getElementById('delivery-fee').innerText = deliveryFee.toFixed(2);
            document.getElementById('items-cost').innerText = itemsCost.toFixed(2);
            const total = deliveryFee + itemsCost;
            document.getElementById('total-price').innerText = total.toFixed(2);
            document.getElementById('modal-total').innerText = total.toFixed(2);
        }

        function openPayment() {
            if (currentType === 'buy') {
                const addr = document.getElementById('buy-address').value.trim();
                let hasItem = false;
                document.querySelectorAll('#form-buy .item-name').forEach(i => { if(i.value.trim()) hasItem = true; });
                if (!addr) return jiranAlert("请填好【送货地址】哦！🏠");
                if (!hasItem) return jiranAlert("请告诉我们要【买什么】呀！🛒");
            } else {
                const p = document.getElementById('send-pickup').value.trim();
                const d = document.getElementById('send-dropoff').value.trim();
                let hasItem = false;
                document.querySelectorAll('#send-items .item-name').forEach(i => { if(i.value.trim()) hasItem = true; });
                if (!p) return jiranAlert("请填写【哪里取货】！📦");
                if (!d) return jiranAlert("请填写【送到哪里】！🚗");
                if (!hasItem) return jiranAlert("请描述一下【货品】📦");
            }
            document.getElementById('pay-modal').style.display = 'flex';
        }

        function finishOrder() {
            const phone = "60126947903";
            const total = document.getElementById('total-price').innerText;
            const fee = document.getElementById('delivery-fee').innerText;
            let itemsDetail = "";
            let mainAddress = "";
            let navLinks = "";

            if (currentType === 'buy') {
                const addr = document.getElementById('buy-address').value.trim();
                mainAddress = addr;
                navLinks = `%0A📍 *导航*: https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(addr)}`;
                document.querySelectorAll('#buy-items > div').forEach(row => {
                    const n = row.querySelector('.item-name').value;
                    const p = row.querySelector('.item-price')?.value || "0";
                    if(n) itemsDetail += `%0A- ${n} (RM${p})`;
                });
            } else {
                const p = document.getElementById('send-pickup').value.trim();
                const d = document.getElementById('send-dropoff').value.trim();
                mainAddress = `取货: ${p}%0A📍 送货: ${d}`;
                navLinks = `%0A🚗 *取货导航*: https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p)}%0A🚗 *送货导航*: https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(d)}`;
                document.querySelectorAll('#send-items > div').forEach(row => {
                    const n = row.querySelector('.item-name').value;
                    if(n) itemsDetail += `%0A- ${n}`;
                });
            }

            const text = `💰 *JiranGo 预付订单*%0A------------------%0A💵 *支付总计*: RM${total}%0A🛵 *跑腿费用*: RM${fee}%0A%0A🏠 *地址及导航*:%0A📍 ${mainAddress}${navLinks}%0A%0A📝 *货品详情*: ${itemsDetail}%0A%0A✅ *已按预估价完成转账*`;
            window.location.href = `https://wa.me/${phone}?text=${text}`;
        }
    </script>
</body>
</html>
