<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>FM Check Test</title>
</head>
<body style="text-align:center; padding:50px; background:#fdf2e9;">
    <h2>🎙️ 心願 FM 查詢測試</h2>
    <input type="text" id="name" placeholder="姓名">
    <input type="text" id="phone" placeholder="末4位">
    <button onclick="test()">查詢</button>
    <div id="out" style="margin-top:20px; font-weight:bold; color:blue;"></div>

    <script>
        async function test() {
            const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRGpv5GQ4HLRd7LfPeaTrPA9LB3ct-IiHXdUEZ7Ck1av3Or4N_v1-aMa1iJFd6rfwbUlTUoZECqiaX2/pub?output=csv';
            const res = await fetch(url);
            const text = await res.text();
            console.log("数据已收到");
            const rows = text.split('\n');
            const n = document.getElementById('name').value;
            const p = document.getElementById('phone').value;
            
            let found = false;
            rows.forEach(r => {
                const c = r.split(',');
                if(c[0].trim() === n && c[1].trim() === p) {
                    document.getElementById('out').innerText = "會員編號：" + c[2];
                    found = true;
                }
            });
            if(!found) document.getElementById('out').innerText = "未找到";
        }
    </script>
</body>
</html>
