<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JiranGo - 邻里物流</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 使用最清晰的系统字体，加大字号 */
        body { background-color: #f7f9fc; font-family: system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .service-card { border-radius: 1.5rem; transition: all 0.2s ease; cursor: pointer; border: 3px solid transparent; }
        .service-card.selected { border-color: #2563eb; background-color: #eff6ff; }
        
        /* 大字号输入框 */
        .big-input { width: 100%; border-radius: 14px; border: 2px solid #e5e7eb; padding: 14px; font-size: 18px; font-weight: 600; color: #1f2937; background: white; }
        .big-input:focus { outline: none; border-color: #2563eb; background-color: #fff; }
        
        /* 醒目的勾选框 */
        .check-box { width: 28px; height: 28px; border: 3px solid #d1d5db; border-radius: 8px; position: relative; }
        input:checked + .check-box { background-color: #2563eb; border-color: #2563eb; }
        input:checked + .check-box::after { content: "✓"; color: white; position: absolute; top: -2px; left: 4px; font-weight: bold; font-size: 20px; }
        
        /* 安装提示条 */
        #install-banner { display: none; }
    </style>
</head>
<body class="pb-24">

    <header class="bg-white px-4 py-6 shadow-sm sticky top-0 z-20 border-b-2 border-blue-50">
        <h1 class="text-2xl font-black text-blue-600 text-center tracking-tight">🚗 JiranGo 邻里跑腿</h1>
    </header>

    <div id="install-banner" class="bg-blue-600 p-4 text-white flex justify-between items-center shadow-lg">
        <p class="text-sm font-bold">把 JiranGo 加到桌面，下单更快！</p>
        <button id="install-button" class="bg-white text-blue-600 px-4 py-1 rounded-full text-sm font-black">安装</button>
    </div>

    <main class="p-4 space-y-6">
        
        <div class="grid grid-cols-2 gap-4">
            <div id="btn-buy" onclick="showForm('buy')" class="service-card p-6 text-center shadow-md bg-orange-100 selected">
                <div class="text-5xl mb-2">🛒</div>
                <div class="text-lg font-black text-orange-900">帮忙买</div>
            </div>
            <div id="btn-send" onclick="showForm('send')" class="service-card p-6 text-center shadow-md bg-blue-100">
                <div class="text-5xl mb-2">📦</div>
                <div class="text-lg font-black text-blue-900">帮忙送</div>
            </div>
        </div>

        <div id="form-container" class="bg-white p-6 rounded-[2rem] shadow-xl border-2 border-gray-50">
            
            <div id="form-buy" class="space-y-5">
                <div>
                    <label class="text-xs font-black text-blue-500 uppercase ml-1">送货到哪里？(Address)</label>
                    <input type="text" id="buy-address" placeholder="例: No. 12, Jalan SG 1/..." class="big-input mt-1">
                </div>

                <div class="border-t-2 border-dashed border-gray-100 my-6"></div>

                <div>
                    <label class="text-xs font-black text-blue-500 uppercase ml-1 mb-2 block">购物清单 (Shopping List)</label>
                    <div id="buy-items" class="space-y-4">
                        <div class="flex items-center gap-3">
                            <input type="text" placeholder="想买什么?" class="big-input flex-1">
                            <label class="flex flex-col items-center">
                                <input type="checkbox" class="hidden item-has-photo">
                                <div class="check-box"></div>
                                <span class="text-[10px] font-bold text-gray-400 mt-1">有图</span>
                            </label>
                        </div>
                        <div class="flex items-center gap-3">
                            <input type="text" placeholder="想买什么?" class="big-input flex-1">
                            <label class="flex flex-col items-center">
                                <input type="checkbox" class="hidden item-has-photo">
                                <div class="check-box"></div>
                                <span class="text-[10px] font-bold text-gray-400 mt-1">有图</span>
                            </label>
                        </div>
                    </div>
                    <button onclick="addBuyRow()" class="mt-4 text-sm text-blue-600 font-black border-2 border-blue-100 px-4 py-2 rounded-full">+ 增加项目</button>
                </div>
            </div>

            <div id="form-send" class="space-y-5 hidden">
                <div>
                    <label class="text-xs font-black text-blue-500 uppercase ml-1">哪里取货？(Pickup)</label>
                    <input type="text" id="send-pickup" placeholder="哪里拿？" class="big-input mt-1">
                </div>
                <div>
                    <label class="text-xs font-black text-blue-500 uppercase ml-1">送到哪里？(Dropoff)</label>
                    <input type="text" id="send-dropoff" placeholder="送到哪？" class="big-input mt-1">
                </div>
                <div>
                    <label class="text-xs font-black text-blue-500 uppercase ml-1">是什么货品？(Item)</label>
                    <input type="text" id="send-item" placeholder="面包、包裹、药..." class="big-input mt-1">
                </div>
                <label class="flex items-center gap-4 bg-gray-50 p-4 rounded-2xl border-2 border-gray-100">
                    <input type="checkbox" id="send-has-photo" class="hidden">
                    <div class="check-box"></div>
                    <span class="text-md font-black text-gray-700">我有照片 / 取货码</span>
                </label>
            </div>

            <button onclick="submitOrder()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-xl shadow-lg mt-8 active:scale-95 transition-all flex items-center justify-center gap-3">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="h-8 w-8" alt="WA">
                确认下单
            </button>
        </div>
    </main>

    <script>
        let currentType = 'buy';
        let deferredPrompt;

        // PWA 安装提示逻辑
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-banner').style.display = 'flex';
        });

        document.getElementById('install-button').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    document.getElementById('install-banner').style.display = 'none';
                }
                deferredPrompt = null;
            }
        });

        function showForm(type) {
            currentType = type;
            document.getElementById('btn-buy').classList.toggle('selected', type === 'buy');
            document.getElementById('btn-send').classList.toggle('selected', type === 'send');
            document.getElementById('form-buy').classList.toggle('hidden', type !== 'buy');
            document.getElementById('form-send').classList.toggle('hidden', type !== 'send');
        }

        function addBuyRow() {
            const list = document.getElementById('buy-items');
            const div = document.createElement('div');
            div.className = "flex items-center gap-3";
            div.innerHTML = `
                <input type="text" placeholder="想买什么?" class="big-input flex-1">
                <label class="flex flex-col items-center">
                    <input type="checkbox" class="hidden item-has-photo">
                    <div class="check-box"></div>
                    <span class="text-[10px] font-bold text-gray-400 mt-1">有图</span>
                </label>
            `;
            list.appendChild(div);
        }

        function submitOrder() {
            const phone = "60126947903"; 
            let text = "";
            let photoAlert = false;

            if (currentType === 'buy') {
                const address = document.getElementById('buy-address').value;
                if(!address) return alert("请填写送货地址！");
                const rows = document.querySelectorAll('#buy-items > div');
                let itemList = "";
                rows.forEach((row, index) => {
                    const input = row.querySelector('input');
                    const isPhoto = row.querySelector('.item-has-photo').checked;
                    if(input.value.trim() !== "") {
                        if(isPhoto) photoAlert = true;
                        itemList += `%0A${index+1}. ${input.value}${isPhoto ? " 📸(有图)" : ""}`;
                    }
                });
                if(!itemList) return alert("清单是空的哦！");
                text = `🚗 *JiranGo 邻里代购* 🛒%0A------------------%0A📍 *送货地址*: ${address}%0A📝 *购物清单*:${itemList}`;
            } else {
                const pickup = document.getElementById('send-pickup').value;
                const dropoff = document.getElementById('send-dropoff').value;
                const item = document.getElementById('send-item').value;
                if(!pickup || !dropoff || !item) return alert("请填写完整配送信息！");
                if(document.getElementById('send-has-photo').checked) photoAlert = true;
                text = `🚗 *JiranGo 邻里派送* 📦%0A------------------%0A📍 *取货*: ${pickup}%0A📍 *送货*: ${dropoff}%0A📝 *物品*: ${item}`;
            }

            const photoNote = photoAlert ? "%0A%0A⚠️ *温馨提醒：跑腿员收到讯息后，请记得补发参考照片哦！*" : "";
            window.location.href = `https://wa.me/${phone}?text=${text}${photoNote}`;
        }
    </script>
</body>
</html>
