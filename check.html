<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRGpv5GQ4HLRd7LfPeaTrPA9LB3ct-IiHXdUEZ7Ck1av3Or4N_v1-aMa1iJFd6rfwbUlTUoZECqiaX2/pub?output=csv';

    async function checkMember() {
        const btn = document.getElementById('searchBtn');
        const nameInput = document.getElementById('searchName').value.replace(/\s/g, '').toUpperCase();
        const phoneInput = document.getElementById('searchPhone').value.trim(); // 用戶輸入的 4 位數
        
        const resultDiv = document.getElementById('result');
        const errorMsg = document.getElementById('errorMsg');

        if (!nameInput || !phoneInput) {
            alert("請輸入姓名和手機末 4 位");
            return;
        }

        btn.innerText = "搜尋中...";
        try {
            const response = await fetch(csvUrl + '&t=' + new Date().getTime());
            const data = await response.text();
            const rows = data.split(/\r?\n/).filter(row => row.trim() !== ""); 

            let found = false;
            for (let i = 1; i < rows.length; i++) {
                const cols = rows[i].split(',').map(c => c.replace(/"/g, '').trim());
                
                if (cols.length >= 3) {
                    const dbName = cols[0].replace(/\s/g, '').toUpperCase();
                    // 關鍵修改：截取表格內電話號碼的最後 4 位進行比對
                    const dbFullPhone = cols[1].replace(/\D/g, ''); // 只拿數字
                    const dbLast4 = dbFullPhone.slice(-4); 

                    if (dbName === nameInput && dbLast4 === phoneInput) {
                        document.getElementById('resName').innerText = cols[0];
                        document.getElementById('resID').innerText = cols[2];
                        resultDiv.style.display = 'block';
                        errorMsg.style.display = 'none';
                        found = true;
                        break;
                    }
                }
            }
            if (!found) {
                resultDiv.style.display = 'none';
                errorMsg.style.display = 'block';
            }
        } catch (e) {
            alert("網路連線失敗");
        } finally {
            btn.innerText = "立即查詢";
        }
    }
</script>
