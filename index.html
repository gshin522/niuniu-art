<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>牛牛畫廊 · 今日靜思語</title>
    <style>
        /* 关键：把 body 背景设为透明，防止遮挡 */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'Noto Sans SC', sans-serif; background: none; }
        
        #bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            /* 预设一个保底背景，确保加载时不是黑屏 */
            background: url('https://images.unsplash.com/photo-1504858700536-882c978a3464') no-repeat center center;
            background-size: cover !important;
            transition: background 1s ease-in-out;
            z-index: -1; 
        }

        .container { display: flex; align-items: center; justify-content: center; height: 100vh; width: 100vw; }

        .quote-card {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px 25px;
            border-radius: 25px;
            width: 80%; max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 { color: #1a1a1a; font-size: 32px; line-height: 1.5; margin: 0 0 20px 0; }

        .footer { display: flex; flex-direction: column; align-items: center; font-size: 12px; color: rgba(0,0,0,0.6); }
        
        .footer img {
            width: 50px; height: 50px; border-radius: 50%;
            margin-bottom: 10px; object-fit: cover;
            border: 2px solid white;
        }
    </style>
</head>
<body>
    <div id="bg-layer"></div>
    <div class="container">
        <div class="quote-card">
            <h1 id="quote-text">正在載入...</h1>
            <div class="footer">
                <img src="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?w=100" alt="Logo">
                <span>牛牛畫廊 · 智能藝術</span>
            </div>
        </div>
    </div>

    <script>
        var googleScriptUrl = 'https://script.google.com/macros/s/AKfycbyNgKa4LAURh5jENB9-gfa2nQOHWm-Nz7DHPwFXMIkrfJwntQYAZ9ADN5CK2kVAMnwW/exec';

        function loadQuote() {
            var script = document.createElement('script');
            script.src = googleScriptUrl + '?callback=displayQuote';
            document.body.appendChild(script);
        }

        function displayQuote(data) {
            // 彻底清理链接，防止任何奇怪字符
            var cleanImg = String(data.bgImage || "").replace(/["'\s]/g, "");
            var cleanQuote = String(data.quote || "").replace(/["']/g, "");

            document.getElementById('quote-text').innerText = cleanQuote;
            
            if (cleanImg.startsWith('http')) {
                // 暴力换背景
                document.getElementById('bg-layer').style.backgroundImage = "url(" + cleanImg + ")";
            }
        }

        window.onload = loadQuote;
    </script>
</body>
</html>
