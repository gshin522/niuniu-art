<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>緊急醫療資訊</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            background-color: #2c3e50;
        }
        
        /* 使用 Unsplash 的高清山水意境圖 */
        .bg-image {
            background-image: url('https://images.unsplash.com/photo-1508197149814-0cc02e8b7f74?w=1000&q=80');
            height: 100%;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* 毛玻璃卡片效果 */
        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            width: 100%;
            max-width: 320px;
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
            overflow: hidden;
            animation: cardEntrance 0.8s ease-out;
        }

        .header {
            background: rgba(192, 57, 43, 0.9);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .content {
            padding: 25px;
            color: #2c3e50;
        }

        .info-row {
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(0,0,0,0.08);
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .label { color: #7f8c8d; font-size: 14px; }
        .value { font-weight: bold; color: #333; font-size: 16px; }

        .btn {
            display: block;
            background: #27ae60;
            color: white;
            text-align: center;
            padding: 18px;
            border-radius: 15px;
            text-decoration: none;
            margin-top: 25px;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 8px 20px rgba(39, 174, 96, 0.4);
            transition: transform 0.2s;
        }

        .btn:active { transform: scale(0.95); }

        @keyframes cardEntrance {
            from { opacity: 0; transform: scale(0.8) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .fs-hint {
            position: absolute;
            bottom: 30px;
            color: rgba(255,255,255,0.6);
            font-size: 13px;
            text-align: center;
            width: 100%;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body onclick="toggleFullScreen()">

    <div class="bg-image">
        <div class="card">
            <div class="header">🆘 緊急聯絡資訊</div>
            <div class="content">
                <div class="info-row"><span class="label">姓名</span> <span class="value">Lim (林先生)</span></div>
                <div class="info-row"><span class="label">血型</span> <span class="value">O+</span></div>
                <div class="info-row"><span class="label">生日</span> <span class="value">07/03/1950</span></div>
                <div class="info-row"><span class="label">健康狀況</span> <span class="value">患有高血壓，需定時服藥</span></div>
                <a href="tel:+60126952368" class="btn">📞 點擊撥打聯絡電話</a>
            </div>
        </div>
        <div class="fs-hint">💡 點擊屏幕任何地方進入全屏</div>
    </div>

    <script>
        // 進入全屏函數
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`無法切換全屏: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }
    </script>
</body>
</html>
