<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JiranGo - 邻里跑腿</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f7f9fc; font-family: system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .big-input { width: 100%; border-radius: 14px; border: 2px solid #e5e7eb; padding: 14px; font-size: 18px; font-weight: 600; color: #1f2937; background: white; }
        .price-input { width: 80px; border-radius: 10px; border: 2px solid #e5e7eb; padding: 10px; font-size: 16px; text-align: center; color: #2563eb; font-weight: bold; }
        .service-card { border-radius: 1.5rem; transition: all 0.2s ease; cursor: pointer; border: 3px solid transparent; }
        .service-card.selected { border-color: #2563eb; background-color: #eff6ff; box-shadow: 0 8px 20px rgba(37,99,235,0.1); }
        .check-box { width: 28px; height: 28px; border: 3px solid #d1d5db; border-radius: 8px; position: relative; background: white; }
        input:checked + .check-box { background-color: #2563eb; border-color: #2563eb; }
        input:checked + .check-box::after { content: "✓"; color: white; position: absolute; top: -2px; left: 4px; font-weight: bold; font-size: 20px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .qr-container { max-width: 220px; margin: 0 auto; border-radius: 20px; overflow: hidden; }
        @keyframes bounceIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .animate-in { animation: bounceIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body class="pb-40">

    <div id="alert-modal" class="modal">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 text-center animate-in shadow-2xl">
            <div class="text-5xl mb-4">⚠️</div>
            <h3 class="text-2xl font-black text-gray-800 mb-2">JiranGo 提示</h3>
            <p id="alert-msg" class="text-gray-500 mb-8 font-medium leading-relaxed"></p>
            <button onclick="closeAlert()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-lg shadow-lg active:scale-95 transition-all">知道啦 🚗</button>
        </div>
    </div>

    <header class="bg-white px-4 py-6 shadow-sm sticky top-0 z-20 border-b-2 border-blue-50 text-center font-black text-2xl text-blue-600">
        🚗 JiranGo
    </header>

    <main class="p-4 space-y-6">
        <div class="grid grid-cols-2 gap-4">
            <div id="btn-buy" onclick="showForm('buy')" class="service-card p-6 text-center shadow-md bg-orange-100 selected">
                <div class="text-5xl mb-2">🛒</div>
                <div class="text-lg font-black text-orange-900">帮忙买</div>
            </div>
            <div id="btn-send" onclick="showForm('send')" class="service-card p-6 text-center shadow-md bg-blue-100">
                <div class="text-5xl mb-2">📦</div>
                <div class="text-lg font-black text-blue-900">帮忙送</div>
            </div>
        </div>

        <div id="form-card" class="bg-white p-6 rounded-[2.5rem] shadow-xl border-2 border-gray-50">
            
            <div id="form-buy" class="space-y-5">
                <div>
                    <label class="text-xs font-black text-blue-500 uppercase ml-1">送货到哪里？ (Address)</label>
                    <input type="text" id="buy-address" placeholder="例: No.12, Jalan SG 1/..." class="big-input mt-1">
                </div>
                <div class="border-t-2 border-dashed border-gray-100 my-6"></div>
                <div class="flex justify-between text-[10px] font-black text-gray-400 uppercase px-1 mb-2">
                    <span class="flex-1">物品名称</span>
                    <span class="w-[80px] text-center">预估价</span>
                    <span class="ml-2">有图</span>
                </div>
                <div id="buy-items" class="space-y-4">
                    <div class="flex items-center gap-2">
                        <input type="text" placeholder="想买什么?" class="big-input flex-1 item-name" oninput="calculateTotal()">
                        <input type="number" placeholder="0" class="price-input item-price" oninput="calculateTotal()">
                        <label class="flex flex-col items-center">
                            <input type="checkbox" class="hidden item-has-photo">
                            <div class="check-box"></div>
                        </label>
                    </div>
                </div>
                <button onclick="addRow('buy-items')" class="mt-4 text-sm text-blue-600 font-black border-2 border-blue-50 px-5 py-2 rounded-full">+ 增加项目</button>
            </div>

            <div id="form-send" class="space-y-5 hidden">
                <div>
                    <label class="text-xs font-black text-blue-500 uppercase ml-1">哪里取货？ (Pickup)</label>
                    <input type="text" id="send-pickup" placeholder="哪里拿包裹？" class="big-input mt-1">
                </div>
                <div>
                    <label class="text-xs font-black text-blue-500 uppercase ml-1">送到哪里？ (Dropoff)</label>
                    <input type="text" id="send-dropoff" placeholder="送到哪里去？" class="big-input mt-1">
                </div>
                <div class="border-t-2 border-dashed border-gray-100 my-6"></div>
                <label class="text-xs font-black text-blue-500 uppercase ml-1">是什么货品？ (Item)</label>
                <div id="send-items" class="space-y-4">
                    <div class="flex items-center gap-3">
                        <input type="text" placeholder="例: 面包、快递、药" class="big-input flex-1 item-name">
                        <label class="flex flex-col items-center">
                            <input type="checkbox" class="hidden item-has-photo">
                            <div class="check-box"></div>
                            <span class="text-[10px] font-bold text-gray-400 mt-1">有图</span>
                        </label>
                    </div>
                </div>
                <button onclick="addRow('send-items')" class="mt-2 text-sm text-blue-600 font-black border-2 border-blue-50 px-5 py-2 rounded-full">+ 增加货品</button>
            </div>

        </div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t-4 border-blue-50 p-5 shadow-[0_-10px_30px_rgba(0,0,0,0.08)] z-30">
        <div class="flex justify-between items-center mb-4">
            <div>
                <span class="text-gray-400 text-[10px] font-black uppercase tracking-wider">Estimated Total</span>
                <div class="text-3xl font-black text-blue-600">RM <span id="total-price">8.00</span></div>
            </div>
            <div class="text-right text-[10px] text-gray-400 font-bold leading-tight">
                跑腿费: RM <span id="delivery-fee">8.00</span><br>
                货品预估: RM <span id="items-cost">0.00</span>
            </div>
        </div>
        <button onclick="openPayment()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-xl shadow-lg active:scale-95 transition-all">确认下单 & 去付款</button>
    </div>

    <div id="pay-modal" class="modal">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-6 text-center space-y-5 animate-in">
            <h2 class="text-2xl font-black text-gray-800">转账给 JiranGo</h2>
            <div class="py-1">
                <p class="text-4xl font-black text-blue-600">RM <span id="modal-total">8.00</span></p>
            </div>
            <div class="qr-container bg-gray-100 aspect-square flex items-center justify-center border-4 border-dashed border-gray-200">
                <span class="text-gray-400 font-bold text-xs p-4 text-center">请将你的 TNG QR 图片放在这里<br>(src="your_qr.png")</span>
            </div>
            <p class="text-[11px] text-gray-400 font-bold leading-relaxed">跑腿费已包含。货品价格多退少补，请在下个页面发送收据图。</p>
            <button onclick="finishOrder()" class="w-full bg-green-500 text-white py-4 rounded-2xl font-black text-lg shadow-lg">已付款，发送通知</button>
            <button onclick="closeModal('pay-modal')" class="text-gray-400 text-sm font-bold block mx-auto">返回修改</button>
        </div>
    </div>

    <script>
        let currentType = 'buy';

        function jiranAlert(msg) {
            document.getElementById('alert-msg').innerText = msg;
            document.getElementById('alert-modal').style.display = 'flex';
        }
        function closeAlert() { document.getElementById('alert-modal').style.display = 'none'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function showForm(type) {
            currentType = type;
            document.getElementById('btn-buy').classList.toggle('selected', type === 'buy');
            document.getElementById('btn-send').classList.toggle('selected', type === 'send');
            document.getElementById('form-buy').classList.toggle('hidden', type !== 'buy');
            document.getElementById('form-send').classList.toggle('hidden', type !== 'send');
            calculateTotal();
        }

        function addRow(id) {
            const div = document.createElement('div');
            div.className = "flex items-center gap-2";
            if(currentType === 'buy') {
                div.innerHTML = `<input type="text" placeholder="..." class="big-input flex-1 item-name" oninput="calculateTotal()"><input type="number" placeholder="0" class="price-input item-price" oninput="calculateTotal()"><label class="flex flex-col items-center"><input type="checkbox" class="hidden item-has-photo"><div class="check-box"></div></label>`;
            } else {
                div.innerHTML = `<input type="text" placeholder="..." class="big-input flex-1 item-name"><label class="flex flex-col items-center"><input type="checkbox" class="hidden item-has-photo"><div class="check-box"></div><span class="text-[10px] font-bold text-gray-400 mt-1">有图</span></label>`;
            }
            document.getElementById(id).appendChild(div);
        }

        function calculateTotal() {
            let deliveryFee = (currentType === 'buy') ? 8.0 : 6.0;
            let itemsCost = 0;
            if(currentType === 'buy') {
                document.querySelectorAll('#form-buy .item-price').forEach(p => { itemsCost += parseFloat(p.value
