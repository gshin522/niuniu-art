<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JiranGo - 邻里跑腿</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        jgDeepGreen: '#2D7D46', // Logo 文字深绿
                        jgHelmetGreen: '#28A745', // 头盔绿
                        jgOrange: '#F9A826', // 翅膀活力橙
                        jgTan: '#D2B48C', // 纸箱浅棕
                        jgBg: '#F8F9F8' // 极淡的绿色背景
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #F8F9F8; font-family: system-ui, -apple-system, sans-serif; }
        
        /* 表单输入框配色 */
        .big-input { width: 100%; border-radius: 14px; border: 2px solid #e5e7eb; padding: 14px; font-size: 16px; font-weight: 600; color: #1f2937; background: white; transition: all 0.2s; }
        .big-input:focus { border-color: #2D7D46; outline: none; box-shadow: 0 0 0 4px rgba(45, 125, 70, 0.1); }
        .price-input { width: 85px; border-radius: 12px; border: 2px solid #e5e7eb; padding: 12px; font-size: 16px; font-weight: bold; text-align: center; color: #2D7D46; }
        
        /* 服务卡片 */
        .service-card { border-radius: 1.5rem; transition: all 0.2s ease; cursor: pointer; border: 3px solid transparent; }
        
        /* 帮忙买卡片选中状态：使用纸箱棕 */
        .service-card-buy.selected { border-color: #D2B48C; background-color: #FAF6ED; transform: scale(1.02); }
        
        /* 帮忙送卡片选中状态：使用头盔绿 */
        .service-card-send.selected { border-color: #28A745; background-color: #EAF7ED; transform: scale(1.02); }

        /* 打勾框配色 */
        .check-box { width: 28px; height: 28px; border: 3px solid #d1d5db; border-radius: 8px; position: relative; background: white; }
        input:checked + .check-box { background-color: #2D7D46; border-color: #2D7D46; }
        input:checked + .check-box::after { content: "✓"; color: white; position: absolute; top: -2px; left: 4px; font-weight: bold; font-size: 20px; }
        
        /* 弹窗配色 */
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); z-index: 100; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
        .pop-up { animation: popScale 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes popScale { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="pb-44">

    <div id="alert-modal" class="modal">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 text-center shadow-2xl pop-up">
            <div id="alert-emoji" class="text-6xl mb-4">🏠</div>
            <h3 id="alert-title" class="text-xl font-black text-gray-800 mb-2">资料不完整哦</h3>
            <p id="alert-msg" class="text-jgDeepGreen mb-8 font-medium leading-relaxed"></p>
            <button onclick="closeAlert()" class="w-full bg-jgOrange text-white py-4 rounded-2xl font-black shadow-lg active:bg-orange-600">好哒，我去修改</button>
        </div>
    </div>

    <header class="bg-white px-4 py-5 shadow-sm sticky top-0 z-20 border-b-2 border-green-50 text-center">
        <h1 class="text-3xl font-black text-jgDeepGreen tracking-tighter">JiranGo</h1>
        <p class="text-sm font-bold text-jg helmetGreen -mt-1">邻里跑腿服务</p>
    </header>

    <main class="p-4 space-y-6">
        <div class="grid grid-cols-2 gap-4">
            <div id="btn-buy" onclick="showForm('buy')" class="service-card service-card-buy p-6 text-center shadow-md bg-white selected">
                <div class="text-5xl mb-2">🛒</div>
                <div class="text-lg font-black text-jgTan">帮忙买</div>
            </div>
            <div id="btn-send" onclick="showForm('send')" class="service-card service-card-send p-6 text-center shadow-md bg-white">
                <div class="text-5xl mb-2">📦</div>
                <div class="text-lg font-black text-jgHelmetGreen">帮忙送</div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border-2 border-jg HelmetGreen/10">
            <div id="form-buy" class="space-y-4">
                <label class="text-xs font-black text-jgDeepGreen uppercase ml-1 tracking-wider">送货地址 (请写详细)</label>
                <input type="text" id="buy-address" placeholder="例: 30, Jalan SG 1/22, Taman Seri Gombak" class="big-input courier-font font-medium text-jgDeepGreen">
                <div class="border-t-2 border-dashed border-jgHelmetGreen/20 my-4"></div>
                <div id="buy-items" class="space-y-4 courier-font font-medium text-jgDeepGreen">
                    <div class="flex items-center gap-2">
                        <input type="text" placeholder="买什么?" class="big-input flex-1 item-name" oninput="calculateTotal()">
                        <input type="number" placeholder="RM" class="price-input item-price" oninput="calculateTotal()">
                        <label class="flex flex-col items-center">
                            <input type="checkbox" class="hidden item-has-photo">
                            <div class="check-box"></div>
                            <span class="text-[10px] font-bold text-gray-400 mt-1">有图</span>
                        </label>
                    </div>
                </div>
                <button onclick="addRow('buy-items')" class="mt-2 text-sm font-black text-jgHelmetGreen px-4 py-1.5 border-2 border-jgHelmetGreen/20 rounded-full bg-white active:bg-jgHelmetGreen/5">+ 增加项目</button>
            </div>

            <div id="form-send" class="space-y-4 hidden courier-font font-medium text-jgDeepGreen">
                <label class="text-xs font-black text-jgDeepGreen uppercase ml-1 tracking-wider">取货与送货地点</label>
                <input type="text" id="send-pickup" placeholder="哪里取货？(店名或地址)" class="big-input mb-2 courier-font font-medium text-jgDeepGreen">
                <input type="text" id="send-dropoff" placeholder="送到哪里？(详细地址)" class="big-input courier-font font-medium text-jgDeepGreen">
                <div class="border-t-2 border-dashed border-jgHelmetGreen/20 my-4"></div>
                <div id="send-items" class="space-y-4">
                    <div class="flex items-center gap-2">
                        <input type="text" placeholder="货品描述?" class="big-input flex-1 item-name">
                        <label class="flex flex-col items-center">
                            <input type="checkbox" class="hidden item-has-photo">
                            <div class="check-box"></div>
                            <span class="text-[10px] font-bold text-gray-400 mt-1">有图</span>
                        </label>
                    </div>
                </div>
                <button onclick="addRow('send-items')" class="mt-2 text-sm font-black text-jgHelmetGreen px-4 py-1.5 border-2 border-jgHelmetGreen/20 rounded-full bg-white active:bg-jgHelmetGreen/5">+ 增加项目</button>
            </div>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t-4 border-jgHelmetGreen/10 p-5 shadow-2xl z-30">
        <div class="flex justify-between items-center mb-4 px-1">
            <div>
                <span class="courier-font text-gray-400 text-[10px] font-black uppercase tracking-wider">预估支付总额 (RM)</span>
                <div class="courier-font text-4xl font-black text-jgDeepGreen">RM <span id="total-price">8.00</span></div>
            </div>
            <div class="text-right courier-font text-[10px] text-gray-400 font-bold leading-tight">
                跑腿费: RM <span id="display-fee">8.00</span><br>
                货品估价: RM <span id="display-items">0.00</span>
            </div>
        </div>
        <button onclick="openPayment()" class="w-full bg-jgDeepGreen text-jgOrange py-5 rounded-2xl font-black text-xl shadow-lg active:bg-green-800 active:scale-95 transition-all tracking-tight">确认下单 & 去付款</button>
    </div>

    <div id="pay-modal" class="modal">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 text-center space-y-5 shadow-2xl pop-up">
            <h2 class="text-2xl font-black text-gray-800 courier-font tracking-tight">确认支付并下单</h2>
            <div class="py-2 courier-font text-6xl font-black text-jgOrange">RM <span id="modal-total">8.00</span></div>
            <div class="bg-white aspect-square rounded-3xl flex items-center justify-center font-bold text-gray-300 border-4 border-dashed border-jghelmetGreen/10 relative overflow-hidden">
                <span class="text-xs px-6 courier-font">[ 放置 TNG QR：qr.png ]</span>
                </div>
            <p class="text-[11px] text-gray-400 font-bold px-2 courier-font leading-relaxed italic">"代购费多退少补，请在 WhatsApp 发送成功付款的收据截图哦！"</p>
            <button onclick="finishOrder()" class="w-full bg-jgHelmetGreen text-white py-4 rounded-2xl font-black text-lg shadow-lg courier-font">已付款，发送 WhatsApp</button>
            <button onclick="closeModal('pay-modal')" class="text-jg helmetGreen text-sm font-bold block mx-auto courier-font">返回修改清单</button>
        </div>
    </div>

    <script>
        var currentType = 'buy';
        function showJiranAlert(emoji, title, msg) {
            document.getElementById('alert-emoji').innerText = emoji;
            document.getElementById('alert-title').innerText = title;
            document.getElementById('alert-msg').innerText = msg;
            document.getElementById('alert-modal').style.display = 'flex';
        }
        function closeAlert() { document.getElementById('alert-modal').style.display = 'none'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function showForm(type) {
            currentType = type;
            document.getElementById('btn-buy').classList.toggle('selected', type === 'buy');
            document.getElementById('btn-send').classList.toggle('selected', type === 'send');
            document.getElementById('form-buy').classList.toggle('hidden', type !== 'buy');
            document.getElementById('form-send').classList.toggle('hidden', type !== 'send');
            calculateTotal();
        }

        function addRow(id) {
            var div = document.createElement('div');
            div.className = "flex items-center gap-2";
            var content = '';
            if(currentType === 'buy') {
                content = '<input type="text" placeholder="..." class="big-input flex-1 item-name" oninput="calculateTotal()"><input type="number" placeholder="RM" class="price-input item-price" oninput="calculateTotal()"><label class="flex flex-col items-center"><input type="checkbox" class="hidden item-has-photo"><div class="check-box"></div><span class="text-[10px] font-bold text-jgDeepGreen mt-1">有图</span></label>';
            } else {
                content = '<input type="text" placeholder="..." class="big-input flex-1 item-name"><label class="flex flex-col items-center"><input type="checkbox" class="hidden item-has-photo"><div class="check-box"></div><span class="text-[10px] font-bold text-jgHelmetGreen mt-1">有图</span></label>';
            }
            div.innerHTML = content;
            document.getElementById(id).appendChild(div);
        }

        function calculateTotal() {
            var deliveryFee = (currentType === 'buy') ? 8.0 : 6.0;
            var itemsCost = 0;
            if(currentType === 'buy') {
                var prices = document.querySelectorAll('#form-buy .item-price');
                prices.forEach(function(p) { itemsCost += parseFloat(p.value || 0); });
            }
            document.getElementById('display-fee').innerText = deliveryFee.toFixed(2);
            document.getElementById('display-items').innerText = itemsCost.toFixed(2);
            var totalVal = deliveryFee + itemsCost;
            document.getElementById('total-price').innerText = totalVal.toFixed(2);
            document.getElementById('modal-total').innerText = totalVal.toFixed(2);
        }

        function openPayment() {
            var isBuy = (currentType === 'buy');
            var addr = isBuy ? document.getElementById('buy-address').value.trim() : document.getElementById('send-dropoff').value.trim();
            
            if (addr.length < 10) {
                showJiranAlert("🏠", "地址不够详细哦", "跑腿员需要详细的门牌或路名才能找到你哦！");
                return;
            }

            if (!isBuy && document.getElementById('send-pickup').value.trim().length < 5) {
                showJiranAlert("📍", "取货地在哪里？", "请填写清楚取货的地点哦！");
                return;
            }

            var itemFound = false;
            var selector = isBuy ? '#buy-items .item-name' : '#send-items .item-name';
            document.querySelectorAll(selector).forEach(function(input) {
                if (input.value.trim().length > 0) itemFound = true;
            });

            if (!itemFound) {
                showJiranAlert("🛒", "清单是空的", "请填写至少一项您想购买或运送的货品。");
                return;
            }

            document.getElementById('pay-modal').style.display = 'flex';
        }

        function finishOrder() {
            var total = document.getElementById('total-price').innerText;
            var fee = document.getElementById('display-fee').innerText;
            var typeLabel = (currentType === 'buy') ? "🛒 代购订单" : "📦 派送订单";
            var addressPart = "";
            var itemPart = "";

            if (currentType === 'buy') {
                var addr = document.getElementById('buy-address').value;
                addressPart = "📍 *送货到*: " + addr;
                var buyItems = document.querySelectorAll('#buy-items > div');
                buyItems.forEach(function(row) {
                    var n = row.querySelector('.item-name').value.trim();
                    var p = row.querySelector('.item-price').value || "0";
                    var pic = row.querySelector('.item-has-photo').checked ? " 📸" : "";
                    if(n) itemPart += "%0A- " + n + " (RM" + p + ")" + pic;
                });
            } else {
                var pLoc = document.getElementById('send-pickup').value;
                var dLoc = document.getElementById('send-dropoff').value;
                addressPart = "📤 *取货*: " + pLoc + "%0A📍 *送到*: " + dLoc;
                var sendItems = document.querySelectorAll('#send-items > div');
                sendItems.forEach(function(row) {
                    var n = row.querySelector('.item-name').value.trim();
                    var pic = row.querySelector('.item-has-photo').checked ? " 📸" : "";
                    if(n) itemPart += "%0A- " + n + pic;
                });
            }

            var text = "💰 *JiranGo 预付订单* (" + typeLabel + ")%0A------------------%0A" + addressPart + "%0A%0A💵 *总计*: RM" + total + "%0A🛵 *跑腿费*: RM" + fee + "%0A📝 *详情*: " + itemPart + "%0A%0A✅ *已转账，请确认收据图*";
            window.location.href = "https://wa.me/60126947903?text=" + text;
        }
    </script>
</body>
</html>
