<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JiranGo - 邻里跑腿</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f7f9fc; font-family: system-ui, -apple-system, sans-serif; }
        .big-input { width: 100%; border-radius: 12px; border: 2px solid #e5e7eb; padding: 12px; font-size: 16px; font-weight: 600; }
        .price-input { width: 70px; border-radius: 10px; border: 2px solid #e5e7eb; padding: 10px; font-size: 14px; text-align: center; color: #2563eb; font-weight: bold; }
        .service-card.selected { border: 3px solid #2563eb; background-color: #eff6ff; }
        /* 找回打勾框 */
        .check-box { width: 24px; height: 24px; border: 2px solid #d1d5db; border-radius: 6px; position: relative; transition: all 0.2s; background: white; }
        input:checked + .check-box { background-color: #2563eb; border-color: #2563eb; }
        input:checked + .check-box::after { content: "✓"; color: white; position: absolute; top: -1px; left: 4px; font-weight: bold; font-size: 16px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body class="pb-32">

    <div id="alert-modal" class="modal">
        <div class="bg-white w-full max-w-sm rounded-[2rem] p-6 text-center shadow-2xl">
            <div class="text-4xl mb-3">⚠️</div>
            <h3 class="text-xl font-black text-gray-800 mb-2">JiranGo 提示</h3>
            <p id="alert-msg" class="text-gray-500 mb-6 font-medium"></p>
            <button onclick="closeAlert()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-black shadow-lg">知道啦</button>
        </div>
    </div>

    <header class="bg-white px-4 py-6 shadow-sm sticky top-0 z-20 border-b-2 border-blue-50 text-center">
        <h1 class="text-2xl font-black text-blue-600">🚗 JiranGo</h1>
    </header>

    <main class="p-4 space-y-6">
        <div class="grid grid-cols-2 gap-4">
            <div id="btn-buy" onclick="showForm('buy')" class="service-card p-6 text-center shadow-md bg-orange-100 rounded-[1.5rem] selected">
                <div class="text-5xl mb-2">🛒</div>
                <div class="text-lg font-black text-orange-900">帮忙买</div>
            </div>
            <div id="btn-send" onclick="showForm('send')" class="service-card p-6 text-center shadow-md bg-blue-100 rounded-[1.5rem]">
                <div class="text-5xl mb-2">📦</div>
                <div class="text-lg font-black text-blue-900">帮忙送</div>
            </div>
        </div>

        <div class="bg-white p-5 rounded-[2rem] shadow-xl border-2 border-gray-50">
            <div id="form-buy" class="space-y-4">
                <label class="text-[10px] font-black text-blue-500 uppercase">送货地址</label>
                <input type="text" id="buy-address" placeholder="哪里送？" class="big-input courier-font font-medium text-gray-800">
                <div class="border-t-2 border-dashed border-gray-100 my-4"></div>
                
                <div class="flex justify-between text-[10px] font-black text-gray-400 uppercase px-1 mb-2">
                    <span class="flex-1">物品名称</span>
                    <span class="w-[70px] text-center">预估价</span>
                    <span class="ml-2">有图</span>
                </div>

                <div id="buy-items" class="space-y-4">
                    <div class="flex items-center gap-2">
                        <input type="text" placeholder="想买什么?" class="big-input flex-1 item-name" oninput="calculateTotal()">
                        <input type="number" placeholder="0" class="price-input item-price" oninput="calculateTotal()">
                        <label class="flex flex-col items-center">
                            <input type="checkbox" class="hidden item-has-photo">
                            <div class="check-box"></div>
                        </label>
                    </div>
                </div>
                <button onclick="addRow('buy-items')" class="text-sm font-black text-blue-600 mt-2">+ 增加项目</button>
            </div>

            <div id="form-send" class="space-y-4 hidden">
                <label class="text-[10px] font-black text-blue-500 uppercase">派送资料</label>
                <input type="text" id="send-pickup" placeholder="哪里取货？" class="big-input">
                <input type="text" id="send-dropoff" placeholder="送到哪里？" class="big-input">
                <div class="border-t-2 border-dashed border-gray-100 my-4"></div>
                <div id="send-items" class="space-y-3">
                    <div class="flex items-center gap-2">
                        <input type="text" placeholder="什么是货品?" class="big-input flex-1 item-name">
                        <label class="flex flex-col items-center">
                            <input type="checkbox" class="hidden item-has-photo">
                            <div class="check-box"></div>
                            <span class="text-[9px] font-bold text-gray-400 mt-1">有图</span>
                        </label>
                    </div>
                </div>
                <button onclick="addRow('send-items')" class="text-sm font-black text-blue-600 mt-2">+ 增加项目</button>
            </div>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t-4 border-blue-50 p-4 shadow-2xl z-30">
        <div class="flex justify-between items-center mb-4">
            <div>
                <span class="text-gray-400 text-[10px] font-black uppercase tracking-wider">Estimated Total</span>
                <div class="text-3xl font-black text-blue-600">RM <span id="total-price">8.00</span></div>
            </div>
            <div class="text-right text-[10px] text-gray-400 font-bold leading-tight">
                跑腿费: RM <span id="delivery-fee">8.00</span><br>
                货品预估: RM <span id="items-cost">0.00</span>
            </div>
        </div>
        <button onclick="openPayment()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-xl shadow-lg active:scale-95 transition-all">确认下单 & 去付款</button>
    </div>

    <div id="pay-modal" class="modal">
        <div class="bg-white w-full rounded-[2.5rem] p-8 text-center space-y-5 shadow-2xl border-4 border-blue-50">
            <h2 class="text-2xl font-black text-gray-800">转账给 JiranGo</h2>
            <div class="py-2">
                <p class="text-sm text-gray-500 font-bold mb-1">应付总额</p>
                <p class="text-4xl font-black text-blue-600">RM <span id="modal-total">8.00</span></p>
            </div>
            <div class="bg-gray-100 aspect-square rounded-3xl flex items-center justify-center font-bold text-gray-300 border-4 border-dashed border-gray-200 overflow-hidden">
                <span class="text-xs">[ 放置 TNG 收款码图片 ]</span>
            </div>
            <p class="text-[11px] text-gray-400 font-bold px-4 leading-relaxed italic">"跑腿费已包含在内。货品价格多退少补，请在WhatsApp发送收据截图。"</p>
            <button onclick="finishOrder()" class="w-full bg-green-500 text-white py-4 rounded-2xl font-black text-lg shadow-lg">已付款，发送通知</button>
            <button onclick="closeModal('pay-modal')" class="text-gray-400 text-sm font-bold block mx-auto">返回修改</button>
        </div>
    </div>

    <script>
        let currentType = 'buy';
        
        function jiranAlert(msg) {
            document.getElementById('alert-msg').innerText = msg;
            document.getElementById('alert-modal').style.display = 'flex';
        }
        function closeAlert() { document.getElementById('alert-modal').style.display = 'none'; }

        function showForm(type) {
            currentType = type;
            document.getElementById('btn-buy').classList.toggle('selected', type === 'buy');
            document.getElementById('btn-send').classList.toggle('selected', type === 'send');
            document.getElementById('form-buy').classList.toggle('hidden', type !== 'buy');
            document.getElementById('form-send').classList.toggle('hidden', type !== 'send');
            calculateTotal();
        }

        function addRow(id) {
            const div = document.createElement('div');
            div.className = "flex items-center gap-2";
            if(currentType === 'buy') {
                div.innerHTML = `<input type="text" placeholder="..." class="big-input flex-1 item-name" oninput="calculateTotal()"><input type="number" placeholder="0" class="price-input item-price" oninput="calculateTotal()"><label class="flex flex-col items-center"><input type="checkbox" class="hidden item-has-photo"><div class="check-box"></div></label>`;
            } else {
                div.innerHTML = `<input type="text" placeholder="..." class="big-input flex-1 item-name"><label class="flex flex-col items-center"><input type="checkbox" class="hidden item-has-photo"><div class="check-box"></div><span class="text-[9px] font-bold text-gray-400 mt-1">有图</span></label>`;
            }
            document.getElementById(id).appendChild(div);
        }

        function calculateTotal() {
            // 代购 RM8, 配送 RM6
            let deliveryFee = (currentType === 'buy') ? 8.0 : 6.0;
            let itemsCost = 0;
            
            if(currentType === 'buy') {
                const prices = document.querySelectorAll('#form-buy .item-price');
                prices.forEach(p => { itemsCost += parseFloat(p.value || 0); });
            }

            const total = deliveryFee + itemsCost;
            document.getElementById('delivery-fee').innerText = deliveryFee.toFixed(2);
            document.getElementById('items-cost').innerText = itemsCost.toFixed(2);
            document.getElementById('total-price').innerText = total.toFixed(2);
            document.getElementById('modal-total').innerText = total.toFixed(2);
        }

        function openPayment() {
            const addr = currentType === 'buy' ? document.getElementById('buy-address').value : document.getElementById('send-pickup').value;
            if(!addr) return jiranAlert("请填好地址哦！找不到路我们就送不到货啦 🚗");
            document.getElementById('pay-modal').style.display = 'flex';
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function finishOrder() {
            const phone = "60126947903";
            const total = document.getElementById('total-price').innerText;
            const fee = document.getElementById('delivery-fee').innerText;
            const typeText = currentType === 'buy' ? "代购(🛒)" : "配送(📦)";
            
            let itemsDetail = "";
            const containerId = currentType === 'buy' ? 'buy-items' : 'send-items';
            const rows = document.querySelectorAll(`#${containerId} > div`);
            rows.forEach((row, i) => {
                const name = row.querySelector('.item-name').value;
                const photo = row.querySelector('.item-has-photo').checked ? " 📸" : "";
                if(name) itemsDetail += `%0A- ${name}${photo}`;
            });

            const text = `💰 *JiranGo 预付订单* (${typeText})%0A------------------%0A💵 *支付总计*: RM${total}%0A🛵 *跑腿费用*: RM${fee}%0A📝 *货品详情*: ${itemsDetail}%0A%0A✅ *已按预估价完成转账*%0A请稍后确认收据图及货品照。`;
            window.location.href = `https://wa.me/${phone}?text=${text}`;
        }
    </script>
</body>
</html>
