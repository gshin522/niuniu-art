<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JiranGo - 邻里跑腿</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f7f9fc; font-family: system-ui, -apple-system, sans-serif; }
        .big-input { width: 100%; border-radius: 14px; border: 2px solid #e5e7eb; padding: 14px; font-size: 18px; font-weight: 600; color: #1f2937; background: white; }
        .big-input:focus { outline: none; border-color: #2563eb; background-color: #fff; }
        .price-input { width: 75px; border-radius: 12px; border: 2px solid #e5e7eb; padding: 12px; font-size: 16px; font-weight: bold; text-align: center; color: #2563eb; }
        .service-card { border-radius: 1.5rem; transition: all 0.2s ease; cursor: pointer; border: 3px solid transparent; }
        .service-card.selected { border-color: #2563eb; background-color: #eff6ff; }
        
        /* 找回打勾框 */
        .check-box { width: 28px; height: 28px; border: 3px solid #d1d5db; border-radius: 8px; position: relative; background: white; }
        input:checked + .check-box { background-color: #2563eb; border-color: #2563eb; }
        input:checked + .check-box::after { content: "✓"; color: white; position: absolute; top: -2px; left: 4px; font-weight: bold; font-size: 20px; }
        
        /* 弹窗样式 */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        @keyframes bounceIn { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .animate-pop { animation: bounceIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body class="pb-40">

    <div id="alert-modal" class="modal">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 text-center animate-pop shadow-2xl">
            <div class="text-5xl mb-4">⚠️</div>
            <h3 class="text-xl font-black text-gray-800 mb-2">JiranGo 提示</h3>
            <p id="alert-msg" class="text-gray-500 mb-8 font-medium leading-relaxed"></p>
            <button onclick="closeAlert()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg">好哒 🚗</button>
        </div>
    </div>

    <header class="bg-white px-4 py-6 shadow-sm sticky top-0 z-20 border-b-2 border-blue-50">
        <h1 class="text-2xl font-black text-blue-600 text-center tracking-tight">🚗 JiranGo 邻里跑腿</h1>
    </header>

    <main class="p-4 space-y-6">
        
        <div class="grid grid-cols-2 gap-4">
            <div id="btn-buy" onclick="showForm('buy')" class="service-card p-6 text-center shadow-md bg-orange-100 selected">
                <div class="text-5xl mb-2">🛒</div>
                <div class="text-lg font-black text-orange-900">帮忙买</div>
            </div>
            <div id="btn-send" onclick="showForm('send')" class="service-card p-6 text-center shadow-md bg-blue-100">
                <div class="text-5xl mb-2">📦</div>
                <div class="text-lg font-black text-blue-900">帮忙送</div>
            </div>
        </div>

        <div id="form-container" class="bg-white p-6 rounded-[2.5rem] shadow-xl border-2 border-gray-50">
            
            <div id="form-buy" class="space-y-5">
                <div>
                    <label class="text-xs font-black text-blue-500 uppercase ml-1">送货到哪里？(Address)</label>
                    <input type="text" id="buy-address" placeholder="例: No. 12, Jalan SG 1/..." class="big-input mt-1">
                </div>

                <div class="border-t-2 border-dashed border-gray-100 my-4"></div>

                <div>
                    <div class="flex justify-between items-center mb-3 px-1">
                        <label class="text-xs font-black text-blue-500 uppercase">购物清单</label>
                        <span class="text-[10px] text-gray-400 font-bold">物品名称 | 估价 | 有图</span>
                    </div>
                    <div id="buy-items" class="space-y-4">
                        <div class="flex items-center gap-2">
                            <input type="text" placeholder="买什么?" class="big-input flex-1 item-name" oninput="calculateTotal()">
                            <input type="number" placeholder="RM" class="price-input item-price" oninput="calculateTotal()">
                            <label class="flex flex-col items-center">
                                <input type="checkbox" class="hidden item-has-photo">
                                <div class="check-box"></div>
                            </label>
                        </div>
                    </div>
                    <button onclick="addRow('buy-items')" class="mt-4 text-sm text-blue-600 font-black border-2 border-blue-100 px-4 py-2 rounded-full">+ 增加项目</button>
                </div>
            </div>

            <div id="form-send" class="space-y-5 hidden">
                <div>
                    <label class="text-xs font-black text-blue-500 uppercase ml-1">哪里取货？(Pickup)</label>
                    <input type="text" id="send-pickup" placeholder="哪里拿？" class="big-input mt-1">
                </div>
                <div>
                    <label class="text-xs font-black text-blue-500 uppercase ml-1">送到哪里？(Dropoff)</label>
                    <input type="text" id="send-dropoff" placeholder="送到哪？" class="big-input mt-1">
                </div>
                <div class="border-t-2 border-dashed border-gray-100 my-4"></div>
                <div id="send-items" class="space-y-4">
                    <div class="flex items-center gap-3">
                        <input type="text" placeholder="什么是货品?" class="big-input flex-1 item-name">
                        <label class="flex flex-col items-center">
                            <input type="checkbox" class="hidden item-has-photo">
                            <div class="check-box"></div>
                            <span class="text-[9px] font-bold text-gray-400 mt-1">有图</span>
                        </label>
                    </div>
                </div>
                <button onclick="addRow('send-items')" class="text-sm text-blue-600 font-black border-2 border-blue-100 px-4 py-2 rounded-full">+ 增加项目</button>
            </div>

        </div>
    </main>
