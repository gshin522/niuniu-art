<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>牛牛畫廊 · 語音終極版</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        #bg { position: fixed; top:0; left:0; width:100%; height:100%; background: url('https://images.unsplash.com/photo-1531306728370-e2ebd9d7bb99') center/cover; z-index:1; }
        .wrap { position: relative; z-index:10; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { background: rgba(255,255,255,0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 40px 20px; border-radius: 30px; width: 85%; max-width: 400px; text-align: center; }
        
        /* 強化按鈕的可點擊感 */
        .btn { 
            background: #fff; border:none; width:70px; height:70px; border-radius:50%; 
            margin-bottom:25px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            -webkit-tap-highlight-color: transparent;
            z-index: 999; /* 確保它在最頂層 */
        }
        .btn:active { background: #ddd; transform: scale(0.9); }
        
        h1 { color: #000; font-size: 32px; margin: 0 0 25px 0; font-weight: bold; }
        .logo { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #fff; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="bg"></div>
    <div class="wrap">
        <div class="card">
            <button class="btn" onclick="sayIt()">
                <svg width="35" height="35" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
            </button>
            <h1 id="txt">載入中...</h1>
            <img src="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?w=100" class="logo">
            <div style="font-size:14px; color: #333; font-weight: 500;">牛牛畫廊 · 智能藝術</div>
        </div>
    </div>
    <script>
        var sUrl = 'https://script.google.com/macros/s/AKfycbyNgKa4LAURh5jENB9-gfa2nQOHWm-Nz7DHPwFXMIkrfJwntQYAZ9ADN5CK2kVAMnwW/exec';
        var quote = "";

        function start() {
            var s = document.createElement('script');
            s.src = sUrl + '?callback=done';
            document.body.appendChild(s);
        }

        function done(d) {
            quote = d.quote.replace(/["'“”]/g, "").trim();
            document.getElementById('txt').innerText = quote;
            if(d.bgImage) {
                var b = d.bgImage.replace(/["'\s]/g, "");
                document.getElementById('bg').style.backgroundImage = "url('" + b + "')";
            }
        }

        // 這是最暴力的發聲函數
        function sayIt() {
            if(!quote) return;
            window.speechSynthesis.cancel();
            var u = new SpeechSynthesisUtterance(quote);
            u.lang = 'zh-CN';
            u.rate = 0.8;
            window.speechSynthesis.speak(u);
            // 點擊反饋：如果沒聲音，至少按鈕會抖一下，證明代碼運行了
            document.querySelector('.btn').style.backgroundColor = "#ccffcc";
            setTimeout(() => { document.querySelector('.btn').style.backgroundColor = "#fff"; }, 200);
        }

        window.onload = start;
    </script>
</body>
</html>
