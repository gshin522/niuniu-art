<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>心願FM | 智慧錦囊</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: "Microsoft JhengHei", sans-serif; }
        /* 背景圖層 */
        #bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; transition: opacity 2s ease; z-index: 1; opacity: 0; }
        /* 遮罩層 */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2; display: flex; align-items: center; justify-content: center; text-align: center; padding: 40px; box-sizing: border-box; }
        /* 語錄文字 */
        #quote { color: white; font-size: 1.8rem; line-height: 1.6; text-shadow: 2px 2px 20px rgba(0,0,0,1); opacity: 0; transition: opacity 1.5s ease; font-weight: bold; }
        /* 啟動按鈕 */
        #btn { position: fixed; bottom: 15%; left: 50%; transform: translateX(-50%); z-index: 3; padding: 18px 40px; background: #FF9800; color: white; border: none; border-radius: 50px; font-size: 1.2rem; font-weight: bold; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.4); display: none; transition: transform 0.2s; }
        #btn:active { transform: translateX(-50%) scale(0.95); }
    </style>
</head>
<body>
    <div id="bg"></div>
    <div id="overlay">
        <div id="quote">正在恭請智慧語錄...</div>
    </div>
    <button id="btn" onclick="startExperience()">開啟智慧錦囊</button>

    <script>
        // 你的 Google Sheet CSV 導出鏈接
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/1kOKRFjKXaK87C5q8PYpoD3pYqVBTOjpfOq65hQGir38/gviz/tq?tqx=out:csv";

        let currentQuote = "";
        let currentAudio = "";

        // 1. 抓取表格數據
        fetch(SHEET_URL)
            .then(res => res.text())
            .then(csv => {
                const rows = csv.split('\n');
                if (rows.length > 1) {
                    const randomIndex = Math.floor(Math.random() * (rows.length - 1)) + 1;
                    // 解析 CSV 行（處理引號和逗號）
                    const data = rows[randomIndex].match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
                    
                    if (data) {
                        // A列: 語錄
                        currentQuote = data[0].replace(/^"|"$/g, "").replace(/""/g, '"');
                        document.getElementById('quote').innerText = currentQuote;
                        document.getElementById('quote').style.opacity = 1;

                        // B列: 背景圖
                        if (data[1]) {
                            const bgUrl = data[1].replace(/^"|"$/g, "").trim();
                            if(bgUrl.startsWith('http')) {
                                const img = new Image();
                                img.src = bgUrl;
                                img.onload = () => {
                                    document.getElementById('bg').style.backgroundImage = `url('${bgUrl}')`;
                                    document.getElementById('bg').style.opacity = 1;
                                };
                            }
                        }
                        
                        // C列: 音檔
                        if (data[2]) {
                            currentAudio = data[2].replace(/^"|"$/g, "").trim();
                        }

                        // 數據準備好了，顯示按鈕
                        document.getElementById('btn').style.display = 'block';
                    }
                }
            })
            .catch(err => {
                document.getElementById('quote').innerText = "連接失敗，請稍後再試";
                console.error(err);
            });

        function startExperience() {
            // A. 全屏觸發
            const de = document.documentElement;
            if (de.requestFullscreen) de.requestFullscreen();
            else if (de.webkitRequestFullscreen) de.webkitRequestFullscreen();

            // B. 隱藏按鈕
            document.getElementById('btn').style.display = 'none';

            // C. 播放聲音
            if (currentAudio && currentAudio.includes('http')) {
                const audio = new Audio(currentAudio);
                audio.play().catch(e => {
                    console.warn("自動播放受阻，切換AI朗讀");
                    speakAI();
                });
            } else {
                speakAI();
            }
        }

        function speakAI() {
            const msg = new SpeechSynthesisUtterance(currentQuote);
            msg.lang = 'zh-CN';
            msg.rate = 0.9;
            window.speechSynthesis.speak(msg);
        }
    </script>
</body>
</html>
