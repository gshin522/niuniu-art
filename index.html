<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>牛牛畫廊 · 今日靜思語</title>
    <style>
        /* 1. 基础样式 */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'Noto Sans SC', sans-serif; }
        
        /* 2. 全屏山水背景：强制铺满，不留白 */
        .full-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            /*https://images.unsplash.com/photo-1504858700536-882c978a3464?q=80&w=2070&auto=format&fit=crop  */
            background: url(' https://images.unsplash.com/photo-1504858700536-882c978a3464?q=80&w=2070&auto=format&fit=crop ') no-repeat center center;
            background-size: cover !important;
            z-index: -1;
        }

        /* 3. 中央容器 */
        .container {
            display: flex; align-items: center; justify-content: center;
            height: 100vh; width: 100vw;
        }

        /* 4. 毛玻璃文字方格 - 高级感 */
        .quote-card {
            background: rgba(255, 255, 255, 0.5); /* 半透明 */
            backdrop-filter: blur(15px); /* 毛玻璃模糊 */
            -webkit-backdrop-filter: blur(15px);
            padding: 40px 20px;
            border-radius: 20px;
            width: 85%; max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* 5. 调整文字大小：醍醐灌顶大字报 */
        h1 { 
            color: #1a1a1a; font-size: 8vw; line-height: 1.5; 
            font-weight: bold; margin: 20px 0;
            word-wrap: break-word;
        }

        /* 6. Logo 样式 */
        .logo-img {
            /*https://images.unsplash.com/photo-1504858700536-882c978a3464?q=80&w=2070&auto=format&fit=crop  */
            background: url('https://images.unsplash.com/photo-1504858700536-882c978a3464?q=80&w=2070&auto=format&fit=crop ') no-repeat center center;
            background-size: contain;
            width: 100px; /* Logo 宽度 */
            height: 100px; /* Logo 高度 */
            margin: 0 auto 20px auto; /* 居中，底部留白 */
        }

        .footer { font-size: 14px; color: #555; letter-spacing: 2px; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@100;300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="full-bg"></div> <div class="container">
        <div class="quote-card">
            <div class="logo-img"></div> <h1 id="quote-text">載入中...</h1> <div class="footer">牛牛畫廊 · 智能藝術</div>
        </div>
    </div>

    <script>
        // 阿新，这里需要你的 Google Apps Script 网址！
        // 逻辑：GitHub 网页是“外壳”，依然去你的 Google Sheet 抓语录。
        
        // 1. 去 Google Apps Script 的 `doGet` 函数末尾，把 
        // return HtmlService.createHtmlOutput(html)
        // 改成
        // return ContentService.createTextOutput(JSON.stringify({quote: quote, bgImage: bgImage})).setMimeType(ContentService.MimeType.JSON);
        
        // 2. 重新部署 Google Apps Script，复制那个新的 Web App URL。
        
        // 3. 把那个新的 Web App URL 填入下面：
        var googleScriptUrl = 'https://script.google.com/macros/s/AKfycbxTvdj1CsPkOC8utKanMeKGO5iueJygsa9iw5NLz2JqXTCLnzkmRt6G13kox1yftE0l/exec  ';

        fetch(googleScriptUrl)
            .then(response => response.json())
            .then(data => {
                document.getElementById('quote-text').innerText = data.quote;
                // 如果你想随机背景，把下面这一行取消注释
                // document.querySelector('.full-bg').style.background = "url('" + data.bgImage + "') no-repeat center center";
            });
    </script>
</body>
</html>
