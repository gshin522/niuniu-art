<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>牛牛畫廊 · 今日靜思語</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'Noto Sans SC', sans-serif; background-color: #1a1a1a; }
        
        .full-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #222 no-repeat center center;
            background-size: cover !important;
            transition: background 1.2s ease-in-out;
            z-index: -1;
        }

        .container {
            display: flex; align-items: center; justify-content: center;
            height: 100vh; width: 100vw;
        }

        .quote-card {
            background: rgba(255, 255, 255, 0.48);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 50px 30px;
            border-radius: 30px;
            width: 82%; max-width: 450px;
            text-align: center;
            box-shadow: 0 15px 45px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        h1 { 
            color: #1a1a1a; font-size: 8.5vw; line-height: 1.5; 
            font-weight: 500; margin: 0;
            word-wrap: break-word;
        }

        @media screen and (min-width: 600px) { h1 { font-size: 42px; } }

        .footer { margin-top: 30px; font-size: 13px; color: rgba(0,0,0,0.5); letter-spacing: 2px; }
        
        .loading { font-size: 18px; color: #444; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="full-bg" id="bg-layer"></div>
    <div class="container">
        <div class="quote-card">
            <h1 id="quote-text" class="loading">正在靜思中...</h1>
            <div class="footer">牛牛畫廊 · 智能藝術</div>
        </div>
    </div>

    <script>
        // 1. 阿新最新的 Google Script URL
        var googleScriptUrl = 'https://script.google.com/macros/s/AKfycbyNgKa4LAURh5jENB9-gfa2nQOHWm-Nz7DHPwFXMIkrfJwntQYAZ9ADN5CK2kVAMnwW/exec';

        // 2. 核心加载函数
        function loadQuote() {
            var script = document.createElement('script');
            script.src = googleScriptUrl + '?callback=displayQuote';
            document.body.appendChild(script);
        }

        // 3. 数据处理逻辑（带自动去引号功能）
        function displayQuote(data) {
            var textElem = document.getElementById('quote-text');
            textElem.classList.remove('loading');
            
            // 自动清理语录中多余的引号
            var rawQuote = String(data.quote || "心静自然凉");
            var cleanQuote = rawQuote.replace(/^["']|["']$/g, ''); 
            textElem.innerText = cleanQuote;
            
            // 自动清理图片链接中多余的引号
            if(data.bgImage) {
                var cleanImg = String(data.bgImage).replace(/^["']|["']$/g, '');
                if(cleanImg.startsWith('http')) {
                    document.getElementById('bg-layer').style.backgroundImage = "url('" + cleanImg + "')";
                }
            }
        }

        window.onload = loadQuote;
    </script>
</body>
</html>
