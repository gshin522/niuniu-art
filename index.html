<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>牛牛畫廊 · 今日靜思語</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'Noto Sans SC', sans-serif; background-color: #1a1a1a; }
        
        /* 全屏背景图层 */
        .full-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #222 url('https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5') no-repeat center center;
            background-size: cover !important;
            transition: background 1.2s ease-in-out;
            z-index: -1;
        }

        .container {
            display: flex; align-items: center; justify-content: center;
            height: 100vh; width: 100vw;
        }

        .quote-card {
            background: rgba(255, 255, 255, 0.48);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 50px 30px;
            border-radius: 30px;
            width: 82%; max-width: 450px;
            text-align: center;
            box-shadow: 0 15px 45px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        h1 { color: #1a1a1a; font-size: 8.5vw; line-height: 1.5; font-weight: 500; margin: 0; word-wrap: break-word; }
        @media screen and (min-width: 600px) { h1 { font-size: 42px; } }

        .footer { 
            margin-top: 30px; font-size: 13px; color: rgba(0,0,0,0.5); letter-spacing: 2px;
            display: flex; flex-direction: column; align-items: center;
        }
        
        /* 这里的 Logo 样式 */
        .footer img {
            width: 45px; height: 45px; border-radius: 50%;
            margin-bottom: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            object-fit: cover;
        }
        
        .loading { font-size: 18px; color: #444; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="full-bg" id="bg-layer"></div>
    <div class="container">
        <div class="quote-card">
            <h1 id="quote-text" class="loading">正在靜思中...</h1>
            <div class="footer">
                <img src="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?w=100" alt="Logo">
                <span>牛牛畫廊 · 智能藝術</span>
            </div>
        </div>
    </div>

    <script>
        var googleScriptUrl = 'https://script.google.com/macros/s/AKfycbyNgKa4LAURh5jENB9-gfa2nQOHWm-Nz7DHPwFXMIkrfJwntQYAZ9ADN5CK2kVAMnwW/exec';

        function loadQuote() {
            var script = document.createElement('script');
            script.src = googleScriptUrl + '?callback=displayQuote';
            document.body.appendChild(script);
        }

        function displayQuote(data) {
            var textElem = document.getElementById('quote-text');
            var bgLayer = document.getElementById('bg-layer');
            textElem.classList.remove('loading');
            
            // 核心修复：彻底清除任何可能存在的引号
            function clean(str) {
                return String(str || "").replace(/["']/g, "").trim();
            }

            textElem.innerText = clean(data.quote);
            
            var imgUrl = clean(data.bgImage);
            if(imgUrl.startsWith('http')) {
                bgLayer.style.backgroundImage = "url('" + imgUrl + "')";
            }
        }

        window.onload = loadQuote;
    </script>
</body>
</html>
