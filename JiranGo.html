<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JiranGo - 邻里物流跑腿</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f7f9fc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        .service-card { border-radius: 1.5rem; transition: all 0.2s ease; cursor: pointer; border: 2px solid transparent; }
        .service-card.selected { border-color: #3b82f6; background-color: #eff6ff; box-shadow: 0 4px 15px rgba(59,130,246,0.15); }
        .input-group label { display: block; text-size: 10px; font-weight: bold; color: #3b82f6; uppercase; margin-bottom: 2px; }
        .input-box { width: 100%; border-radius: 12px; border: 1px solid #e5e7eb; padding: 12px; font-size: 14px; color: #374151; background: white; }
        .input-box:focus { outline: none; border-color: #3b82f6; ring: 2px solid #bfdbfe; }
        
        /* 针对超市清单的Couier字体 */
        .courier-font { font-family: 'Courier New', Courier, monospace; }
        .checkbox-container { cursor: pointer; }
        .checkbox-container input { display: none; }
        .check-box { width: 22px; height: 22px; border: 2px solid #d1d5db; border-radius: 6px; position: relative; transition: all 0.2s; }
        .checkbox-container input:checked + .check-box { background-color: #3b82f6; border-color: #3b82f6; }
        .check-box::after { content: "✓"; color: white; position: absolute; top: 0; left: 4px; font-weight: bold; font-size: 14px; opacity: 0; }
        .checkbox-container input:checked + .check-box::after { opacity: 1; }
    </style>
</head>
<body class="pb-24 courier-font">

    <div class="text-center py-5 border-b border-gray-100 bg-white sticky top-0 z-20">
        <h1 class="text-xl font-black text-blue-600 tracking-tight flex items-center justify-center gap-2">🚗 JiranGo</h1>
        <p class="text-[9px] text-gray-400 uppercase tracking-widest mt-1">Neighborhood Runner Service</p>
    </div>

    <main class="p-4 space-y-5">
        
        <div class="grid grid-cols-2 gap-4">
            <div id="btn-buy" onclick="showForm('buy')" class="service-card p-4 text-center shadow-sm bg-orange-100 selected">
                <div class="text-3xl mb-1">🍜</div>
                <div class="text-xs font-bold text-orange-800">代购美食</div>
            </div>
            <div id="btn-send" onclick="showForm('send')" class="service-card p-4 text-center shadow-sm bg-blue-100">
                <div class="text-3xl mb-1">📦</div>
                <div class="text-xs font-bold text-blue-800">包裹派送</div>
            </div>
        </div>

        <div id="form-container" class="bg-white p-6 rounded-3xl shadow-lg relative border border-blue-50">
            
            <div id="form-buy" class="space-y-4">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-sm font-bold text-gray-500">SERVICE ORDER (BUY)</span>
                    <span id="order-date" class="text-xs text-gray-400"></span>
                </div>
                
                <div class="input-group">
                    <label>Delivery To (Address)</label>
                    <input type="text" id="buy-address" placeholder="No. 12, Jalan SG 1/..." class="input-box courier-font font-medium text-gray-800">
                </div>

                <div class="border-t-2 border-dashed border-gray-100 my-4"></div>

                <div>
                    <label class="text-[10px] font-bold text-blue-500 uppercase mb-3 block">Shopping List</label>
                    <div id="buy-items" class="space-y-3">
                        <div class="flex items-center gap-3">
                            <span class="text-gray-300 text-xs">01</span>
                            <input type="text" placeholder="想要买什么?" class="input-box courier-font font-medium flex-1">
                            <label class="checkbox-container flex items-center gap-1.5">
                                <input type="checkbox" class="item-has-photo">
                                <div class="check-box"></div>
                                <span class="text-xs text-gray-400">图</span>
                            </label>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="text-gray-300 text-xs">02</span>
                            <input type="text" placeholder="想要买什么?" class="input-box courier-font font-medium flex-1">
                            <label class="checkbox-container flex items-center gap-1.5">
                                <input type="checkbox" class="item-has-photo">
                                <div class="check-box"></div>
                                <span class="text-xs text-gray-400">图</span>
                            </label>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="text-gray-300 text-xs">03</span>
                            <input type="text" placeholder="想要买什么?" class="input-box courier-font font-medium flex-1">
                            <label class="checkbox-container flex items-center gap-1.5">
                                <input type="checkbox" class="item-has-photo">
                                <div class="check-box"></div>
                                <span class="text-xs text-gray-400">图</span>
                            </label>
                        </div>
                    </div>
                    <button onclick="addBuyRow()" class="mt-3 text-[9px] text-blue-500 font-bold border border-blue-200 px-3 py-1 rounded-full">+ ADD MORE ITEM</button>
                </div>
            </div>

            <div id="form-send" class="space-y-4 hidden">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-sm font-bold text-gray-500">SERVICE ORDER (SEND/PICKUP)</span>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="input-group">
                        <label>Pickup Location</label>
                        <input type="text" id="send-pickup" placeholder="From where?" class="input-box courier-font font-medium text-gray-800">
                    </div>
                    <div class="input-group">
                        <label>Dropoff Location</label>
                        <input type="text" id="send-dropoff" placeholder="To where?" class="input-box courier-font font-medium text-gray-800">
                    </div>
                </div>

                <div class="input-group my-3">
                    <label>Item Description (什么是货物？)</label>
                    <input type="text" id="send-item" placeholder="面包、包裹、药..." class="input-box courier-font font-medium text-gray-800">
                </div>

                <div class="border-t border-dashed border-gray-100 my-4"></div>

                <div class="flex items-center gap-3 bg-gray-50 p-3 rounded-xl border border-gray-100">
                    <label class="checkbox-container flex items-center gap-3">
                        <input type="checkbox" id="send-has-photo">
                        <div class="check-box"></div>
                        <span class="text-sm font-bold text-blue-600 font-sans">我有这个货品的照片/取货码</span>
                    </label>
                </div>
            </div>

            <p class="text-[9px] text-gray-400 italic text-center my-6">"Connecting Neighbors, Delivering Care"</p>

            <button onclick="submitOrder()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold flex items-center justify-center gap-2 shadow-lg active:scale-95 transition-transform">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="h-6 w-6" alt="WA">
                CONFIRM & WHATSAPP
            </button>
        </div>
    </main>

    <script>
        let currentType = 'buy';
        document.getElementById('order-date').innerText = new Date().toLocaleDateString();

        // 切换服务表单
        function showForm(type) {
            currentType = type;
            // 切换服务卡片样式
            document.getElementById('btn-buy').classList.toggle('selected', type === 'buy');
            document.getElementById('btn-send').classList.toggle('selected', type === 'send');
            // 切换表单内容
            document.getElementById('form-buy').classList.toggle('hidden', type !== 'buy');
            document.getElementById('form-send').classList.toggle('hidden', type !== 'send');
        }

        // 代购表单增加项目
        function addBuyRow() {
            const list = document.getElementById('buy-items');
            const count = list.children.length + 1;
            if(count > 6) return alert("为了配送效率，最多 6 个项目哦！");
            
            const div = document.createElement('div');
            div.className = "flex items-center gap-3";
            div.innerHTML = `
                <span class="text-gray-300 text-xs">0${count}</span>
                <input type="text" placeholder="想要买什么?" class="input-box courier-font font-medium flex-1">
                <label class="checkbox-container flex items-center gap-1.5">
                    <input type="checkbox" class="item-has-photo">
                    <div class="check-box"></div>
                    <span class="text-xs text-gray-400">图</span>
                </label>
            `;
            list.appendChild(div);
        }

        // 统一提交
        function submitOrder() {
            let text = "";
            let photoAlert = false;
            const phone = "60126947903"; 

            if (currentType === 'buy') {
                const address = document.getElementById('buy-address').value;
                if(!address) return alert("老板，还没填地址呢！");

                const rows = document.querySelectorAll('#buy-items > div');
                let itemList = "";

                rows.forEach((row, index) => {
                    const input = row.querySelector('input');
                    const isPhoto = row.querySelector('.item-has-photo').checked;
                    if(input.value.trim() !== "") {
                        const icon = isPhoto ? " 📸 (有图参考)" : "";
                        if(isPhoto) photoAlert = true;
                        itemList += `%0A${index+1}. ${input.value}${icon}`;
                    }
                });

                if(!itemList) return alert("清单还是空的哦！");

                text = `🚗 *JiranGo 邻里代购* 🍜%0A------------------%0A📍 *送货地址*: ${address}%0A📝 *购物清单*:${itemList}`;

            } else {
                // 派送逻辑
                const pickup = document.getElementById('send-pickup').value;
                const dropoff = document.getElementById('send-dropoff').value;
                const item = document.getElementById('send-item').value;
                const isPhoto = document.getElementById('send-has-photo').checked;

                if(!pickup || !dropoff || !item) return alert("请把派送信息填完整哦！");
                if(isPhoto) photoAlert = true;

                text = `🚗 *JiranGo 邻里派送* 📦%0A------------------%0A📍 *取货地点*: ${pickup}%0A📍 *送货地点*: ${dropoff}%0A📝 *货物描述*: ${item}`;
            }

            const photoNote = photoAlert ? "%0A%0A⚠️ *温馨提醒：您标记了有照片/参考，请记得顺便在 WhatsApp 发给我哦！*" : "";
            window.location.href = `https://wa.me/${phone}?text=${text}${photoNote}`;
        }
    </script>
</body>
</html>
